<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#080808;color:#ebebeb;font-family:'DM Mono','Courier New',monospace;overscroll-behavior:none}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
  .bebas{font-family:'Bebas Neue',sans-serif}
  input[type=number]{-moz-appearance:textfield}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
  .set-input{background:#0d0d0d;border:1px solid #1e1e1e;color:#ebebeb;padding:7px 5px;border-radius:4px;width:100%;text-align:center;font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s}
  .card{transition:background 0.15s;cursor:pointer}
  .card:active{background:#111!important}
  .pill{transition:all 0.18s}
  .pill:active{filter:brightness(1.15)}
  .tb{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;padding:10px 12px;transition:color 0.2s;white-space:nowrap}
  .btn{cursor:pointer;transition:all 0.18s;border:none;font-family:'DM Mono',monospace}
  .btn:active{filter:brightness(1.15);transform:scale(0.97)}
  #app{max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}
  .header{padding:env(safe-area-inset-top,20px) 18px 0;border-bottom:1px solid #161616;position:sticky;top:0;background:#080808;z-index:100}
  .tab-content{display:none}.tab-content.active{display:block}
  .chevron{transition:transform 0.2s;display:inline-block}
  .ex-expanded .chevron{transform:rotate(180deg)}
  .expandable{display:none}.expanded .expandable{display:block}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;padding-top:8px">

      </div>

        <button class="btn" onclick="changeWeek(-1)" style="background:none;border:1px solid #1e1e1e;color:#555;padding:4px 10px;border-radius:4px;font-size:14px">‹</button>
        <span id="week-label" style="font-size:9px;color:#444;letter-spacing:0.12em;text-transform:uppercase;min-width:60px;text-align:center">This Week</span>

      </div>
    </div>
    <div style="display:flex;overflow-x:auto;scrollbar-width:none" id="main-tabs">
      <button class="tb" onclick="setTab('train')" data-tab="train">WORKOUT</button>
      <button class="tb" onclick="setTab('fuel')" data-tab="fuel">NUTRITION</button>
      <button class="tb" onclick="setTab('water')" data-tab="water">WATER</button>
      <button class="tb" onclick="setTab('history')" data-tab="history">HISTORY</button>
    </div>
  </div>

  <!-- DAY SELECTOR -->

  <div id="tab-history" class="tab-content"><div style="padding:16px 18px" id="history-content"></div></div>

</div>

// ─── STORAGE ─────────────────────────────────────────────────────────────────

const getKey = (type, w, d) => `fraser_${type}_w${w}_d${d}`;

function saveData(type, dayNum, data) {
  try { localStorage.setItem(getKey(type, weekOffset, dayNum), JSON.stringify(data)); } catch(e) {}
}

function loadData(type, w, d) {
  try {
    const v = localStorage.getItem(getKey(type, w, d));
    return v ? JSON.parse(v) : null;
  } catch(e) { return null; }
}

function getWorkoutLog(dayNum) { return loadData('workout', weekOffset, dayNum) || {}; }
function getNutriLog(dayNum)   { return loadData('nutri',   weekOffset, dayNum) || {}; }
function getWaterLog(dayNum)   { return loadData('water',   weekOffset, dayNum) || {total:0,entries:[]}; }

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children.flat()) {
    if(c==null||c===false) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}

function div(style,...children) { return el('div',{style},...children); }
function span(style,text)       { return el('span',{style},text); }
function bebas(size,color,text) { return el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:size+'px',color,letterSpacing:'0.04em',lineHeight:'1'}},text); }

          el('span',{style:{fontSize:'7px',color:day.accent,border:`1px solid ${day.accent}33`,padding:'2px 5px',borderRadius:'3px',letterSpacing:'0.1em'}},ex.category),

        ),
        el('div',{style:{fontSize:'9px',color:'#444'}},`${ex.sets} × ${ex.reps} · T: ${ex.tempo}`)
      ),

    );
    header.style.cursor='pointer';
    header.onclick = () => {
      expandedEx = isOpen?null:ex.id;
      renderWorkout();
    };
    card.appendChild(header);

    if(isOpen) {
      const body = div({borderTop:'1px solid #161616'});

      const tech = div({padding:'12px 14px',background:'#090909'});
      tech.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.22em',color:day.accent,textTransform:'uppercase',marginBottom:'8px'}},'Technique'));

      tech.appendChild(tempoBox);

        tech.appendChild(div({display:'flex',gap:'7px',fontSize:'11px',color:'#777',lineHeight:'1.5',marginBottom:'5px'},
          el('span',{style:{color:day.accent,flexShrink:'0',opacity:'0.6'}},'→'),
          el('span',{},c)
        ));
      });
      body.appendChild(tech);

      // Set logger
      const setsDiv = div({padding:'12px 14px'});
      setsDiv.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.2em',color:'#333',textTransform:'uppercase',marginBottom:'8px'}},'Log Sets'));
      const hdr = div({display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr',gap:'5px',marginBottom:'5px'});
      ['#','KG','REPS','NOTE'].forEach(h => hdr.appendChild(el('div',{style:{fontSize:'7px',color:'#2a2a2a',letterSpacing:'0.12em',textAlign:'center'}},h)));
      setsDiv.appendChild(hdr);

      for(let si=0;si<ex.sets;si++) {
        const s = exLog.sets?.[si]||{};
        const row = div({display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr',gap:'5px',marginBottom:'4px',alignItems:'center'});
        row.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'13px',color:s.reps?day.accent:'#222',textAlign:'center'}},(si+1)+''));

        ['weight','reps'].forEach(field => {
          const inp = el('input',{type:'number',class:'set-input',placeholder:'—',value:s[field]||''});
          inp.style.cssText += `--a:${day.accent}`;
          inp.onfocus = () => inp.style.borderColor=day.accent;
          inp.onblur = () => inp.style.borderColor='#1e1e1e';
          inp.oninput = () => {
            const cur = getWorkoutLog(day.day);
            const ex2 = cur[ex.id]||{sets:[]};
            const sets = [...(ex2.sets||[])];
            sets[si] = {...(sets[si]||{}),[field]:inp.value};
            const updated = {...cur,[ex.id]:{...ex2,sets}};
            saveData('workout',day.day,updated);
          };
          row.appendChild(inp);
        });

        const noteInp = el('input',{type:'text',class:'set-input',placeholder:'—',value:s.note||''});
        noteInp.style.fontSize='10px';
        noteInp.onfocus = () => noteInp.style.borderColor=day.accent;
        noteInp.onblur = () => noteInp.style.borderColor='#1e1e1e';
        noteInp.oninput = () => {
          const cur = getWorkoutLog(day.day);
          const ex2 = cur[ex.id]||{sets:[]};
          const sets = [...(ex2.sets||[])];
          sets[si] = {...(sets[si]||{}),note:noteInp.value};
          saveData('workout',day.day,{...cur,[ex.id]:{...ex2,sets}});
        };
        row.appendChild(noteInp);
        setsDiv.appendChild(row);
      }
      body.appendChild(setsDiv);
      card.appendChild(body);
    }
    list.appendChild(card);
  });

  // Save button (auto-saves on input, but a visual confirm button is nice UX)
  const saveBtn = el('button',{
    class:'btn',
    style:{width:'100%',background:day.accent,color:'#000',borderRadius:'8px',padding:'14px',fontFamily:"'Bebas Neue',sans-serif",fontSize:'17px',letterSpacing:'0.1em',marginTop:'4px',marginBottom:'28px'},

    }
  },'SAVE WORKOUT');
  list.appendChild(saveBtn);
}

  const target = WATER_TARGETS[day.nutriType];
  const wLog = getWaterLog(day.day);
  const pct = Math.min((wLog.total/target)*100,100);
  const remaining = Math.max(target-wLog.total,0);
  const done = wLog.total>=target;
  const WC = '#3bdfff';
  const con = document.getElementById('water-content');
  con.innerHTML = '';

  // Ring
  const circumference = 2*Math.PI*78;
  const ringWrap = div({display:'flex',flexDirection:'column',alignItems:'center',padding:'24px 0 20px'});
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('width','180');svg.setAttribute('height','180');
  svg.style.transform='rotate(-90deg)';
  const bg = document.createElementNS(svgNS,'circle');
  bg.setAttribute('cx','90');bg.setAttribute('cy','90');bg.setAttribute('r','78');
  bg.setAttribute('fill','none');bg.setAttribute('stroke','#141414');bg.setAttribute('stroke-width','10');
  const fg = document.createElementNS(svgNS,'circle');
  fg.setAttribute('cx','90');fg.setAttribute('cy','90');fg.setAttribute('r','78');
  fg.setAttribute('fill','none');fg.setAttribute('stroke',done?'#6aff3b':WC);fg.setAttribute('stroke-width','10');
  fg.setAttribute('stroke-dasharray',circumference);
  fg.setAttribute('stroke-dashoffset',circumference*(1-pct/100));
  fg.setAttribute('stroke-linecap','round');
  fg.style.transition='stroke-dashoffset 0.5s ease, stroke 0.3s';
  svg.appendChild(bg);svg.appendChild(fg);

  const inner = div({position:'absolute',inset:'0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'});
  inner.appendChild(bebas(42,done?'#6aff3b':WC,(wLog.total/1000).toFixed(1)+'L'));
  inner.appendChild(el('div',{style:{fontSize:'9px',color:'#444',letterSpacing:'0.15em',textTransform:'uppercase',marginTop:'4px'}},`of ${target/1000}L target`));
  inner.appendChild(el('div',{style:{fontSize:'10px',color:done?'#6aff3b':'#555',marginTop:'6px'}},done?'✓ TARGET HIT':`${(remaining/1000).toFixed(1)}L to go`));

  const relWrap = div({position:'relative',width:'180px',height:'180px'});
  relWrap.appendChild(svg);relWrap.appendChild(inner);
  ringWrap.appendChild(relWrap);
  con.appendChild(ringWrap);

  // Status msg
  const msg = done ? "Daily target hit. Cellular hydration optimal — this is what creates the dry defined look."
    : wLog.total===0 ? "Start logging. First 500ml on wake-up is the most critical of the day."
    : wLog.total<target*0.4 ? "You're behind. Catch up now — don't leave it for the afternoon."
    : wLog.total<target*0.7 ? "Making progress. Keep going — afternoon is when most people fall off."
    : "Almost there. One or two more serves and you're done for the day.";
  con.appendChild(div({background:'#0e0e0e',border:`1px solid ${done?'#6aff3b33':WC+'22'}`,borderLeft:`2px solid ${done?'#6aff3b':WC}`,borderRadius:'8px',padding:'10px 14px',marginBottom:'14px'},
    el('p',{style:{margin:'0',fontSize:'11px',color:'#888',lineHeight:'1.7',fontStyle:'italic'}},'💧 '+msg)
  ));

  // Why it matters
  const why = div({background:'#090909',border:'1px solid #141414',borderRadius:'8px',padding:'12px 14px',marginBottom:'14px'});
  why.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.22em',color:WC,textTransform:'uppercase',marginBottom:'8px'}},'Why This Matters For Your Goal'));
  ["Dehydration triggers aldosterone — your body retains subcutaneous water as defence. This blurs ab definition.","4L/day flushes sodium and reduces water retention, directly improving visible leanness.","Proper hydration increases lipolysis — your body burns stored fat more efficiently when well hydrated.","Working outside in Australian sun, you lose 1–2L extra through sweat before you even train."].forEach(t=>{
    why.appendChild(div({display:'flex',gap:'8px',fontSize:'11px',color:'#666',lineHeight:'1.6',marginBottom:'5px'},
      el('span',{style:{color:WC,opacity:'0.5',flexShrink:'0'}},'→'),el('span',{},t)
    ));
  });
  con.appendChild(why);

  // Quick add
  con.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.22em',color:'#333',textTransform:'uppercase',marginBottom:'8px'}},'Quick Add'));
  const quickGrid = div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'6px',marginBottom:'8px'});
  [250,350,500,750].forEach(ml=>{
    const b = el('button',{
      class:'btn',
      style:{background:'#0e0e0e',border:`1px solid ${WC}33`,borderRadius:'8px',padding:'12px 6px',fontFamily:"'Bebas Neue',sans-serif",fontSize:'18px',color:WC,letterSpacing:'0.04em',textAlign:'center'},
      onclick:()=>addWater(ml,day.day)
    },el('div',{},ml+''),el('div',{style:{fontSize:'8px',color:'#444',letterSpacing:'0.1em',marginTop:'1px'}},'ml'));
    quickGrid.appendChild(b);
  });
  con.appendChild(quickGrid);

  // Custom
  const customRow = div({display:'flex',gap:'6px',marginBottom:'6px'});
  const customInp = el('input',{type:'number',class:'set-input',placeholder:'Custom ml',style:'flex:1;font-size:13px'});
  customInp.style.cssText += `;--a:${WC}`;
  customInp.onfocus = ()=>customInp.style.borderColor=WC;
  customInp.onblur = ()=>customInp.style.borderColor='#1e1e1e';
  const addBtn = el('button',{
    class:'btn',
    style:{background:WC,border:'none',borderRadius:'8px',padding:'0 16px',fontFamily:"'Bebas Neue',sans-serif",fontSize:'15px',color:'#000',letterSpacing:'0.08em',flexShrink:'0',height:'36px'},
    onclick:()=>{const v=parseInt(customInp.value);if(v>0){addWater(v,day.day);customInp.value='';}}
  },'ADD');
  customRow.appendChild(customInp);customRow.appendChild(addBtn);
  con.appendChild(customRow);

  // Undo
  if(wLog.entries.length>0) {
    const last = wLog.entries[wLog.entries.length-1];
    con.appendChild(el('button',{
      class:'btn',
      style:{width:'100%',background:'none',border:'1px solid #1e1e1e',borderRadius:'8px',padding:'8px',fontSize:'10px',color:'#444',letterSpacing:'0.1em',marginBottom:'16px'},
      onclick:()=>removeLastWater(day.day)
    },`↩ UNDO LAST (${last.amount}ml)`));
  }

  // Log entries
  if(wLog.entries.length>0) {
    con.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.22em',color:'#333',textTransform:'uppercase',marginBottom:'8px'}},"Today's Log"));
    const entryWrap = div({display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'16px'});
    wLog.entries.forEach(e=>{
      entryWrap.appendChild(div({background:'#0e0e0e',border:`1px solid ${WC}22`,borderRadius:'6px',padding:'5px 10px',fontSize:'10px',color:WC},
        `${e.amount}ml `,el('span',{style:{color:'#333',fontSize:'9px'}},`· ${e.time}`)
      ));
    });
    con.appendChild(entryWrap);
  }

  // Schedule
  con.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.22em',color:'#333',textTransform:'uppercase',marginBottom:'8px',marginTop:'8px'}},'Suggested Schedule'));
  WATER_SCHEDULE.forEach(s=>{
    const row = div({background:'#0e0e0e',border:'1px solid #141414',borderRadius:'8px',padding:'10px 14px',marginBottom:'5px',display:'flex',gap:'10px',alignItems:'flex-start'});
    row.appendChild(el('div',{style:{fontSize:'18px',flexShrink:'0',marginTop:'1px'}},s.icon));
    const info = div({flex:'1'});
    const top = div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'3px'});
    top.appendChild(el('span',{style:{fontSize:'10px',color:WC,fontWeight:'600',letterSpacing:'0.05em'}},s.label));
    top.appendChild(el('span',{style:{fontSize:'9px',color:'#444'}},s.time));
    info.appendChild(top);
    info.appendChild(bebas(16,'#ebebeb',s.amount+'ml'));
    info.appendChild(el('div',{style:{fontSize:'10px',color:'#555',lineHeight:'1.5',marginTop:'3px'}},s.tip));
    row.appendChild(info);
    con.appendChild(row);
  });
}

function addWater(amount, dayNum) {
  const cur = getWaterLog(dayNum);
  const now = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  const updated = {total:cur.total+amount,entries:[...cur.entries,{amount,time:now}]};
  saveData('water',dayNum,updated);
  renderWater();
}

function removeLastWater(dayNum) {
  const cur = getWaterLog(dayNum);
  if(!cur.entries.length) return;
  const last = cur.entries[cur.entries.length-1];
  const updated = {total:Math.max(0,cur.total-last.amount),entries:cur.entries.slice(0,-1)};
  saveData('water',dayNum,updated);
  renderWater();
}

// ─── HISTORY TAB ──────────────────────────────────────────────────────────────

function renderHistory() {
  const con = document.getElementById('history-content');
  con.innerHTML='';
  con.appendChild(el('div',{style:{fontSize:'8px',letterSpacing:'0.22em',color:'#333',textTransform:'uppercase',marginBottom:'16px'}},'Training + Nutrition + Water History'));

  for(let i=0;i<6;i++) {
    const w = weekOffset-i;
    const wLabel = w===0?'This Week':w===-1?'Last Week':`${Math.abs(w)}w ago`;
    const section = div({marginBottom:'20px'});
    section.appendChild(el('div',{style:{fontSize:'8px',letterSpacing:'0.15em',color:'#2a2a2a',textTransform:'uppercase',borderBottom:'1px solid #141414',paddingBottom:'6px',marginBottom:'8px'}},wLabel));
    const row = div({display:'flex',gap:'5px',flexWrap:'wrap'});
    PROGRAM.forEach(d=>{
      const wLog = loadData('workout',w,d.day);
      const nLog = loadData('nutri',w,d.day);
      const wtrLog = loadData('water',w,d.day);
      const hasW = wLog&&Object.keys(wLog).length>0;
      const hasN = nLog&&Object.values(nLog).some(Boolean);
      const hasWtr = wtrLog&&wtrLog.total>0;
      const np = NUTRITION[d.nutriType];
      const card = div({flex:'1',minWidth:'58px',background:hasW||hasN?'#0e0e0e':'#090909',border:`1px solid ${hasW?d.accent+'44':'#141414'}`,borderRadius:'6px',padding:'8px'});
      card.appendChild(bebas(14,hasW?d.accent:'#222',d.title));
      card.appendChild(el('div',{style:{fontSize:'7px',color:hasW?'#555':'#1a1a1a',marginTop:'2px'}},hasW?`${Object.keys(wLog).length} ex`:'—'));
      card.appendChild(el('div',{style:{fontSize:'7px',color:hasN?np.color:'#1a1a1a',marginTop:'2px'}},hasN?`${Object.values(nLog).filter(Boolean).length} meals`:'no food'));
      card.appendChild(el('div',{style:{fontSize:'7px',color:hasWtr?'#3bdfff':'#1a1a1a',marginTop:'2px'}},hasWtr?`${(wtrLog.total/1000).toFixed(1)}L water`:'no water'));
      row.appendChild(card);
    });
    section.appendChild(row);
    con.appendChild(section);
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────

function setTab(t) { activeTab=t; renderActiveTab(); renderTabs(); }
function changeWeek(d) { weekOffset+=d; expandedEx=null; expandedMeal=null; render(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────

render();
</script>
