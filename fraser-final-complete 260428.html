<style>

  .bebas{font-family:'Bebas Neue',sans-serif}

  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

  .card{transition:background 0.15s;cursor:pointer}
  .card:active{background:#111!important}
  .pill{transition:all 0.18s}
  .pill:active{filter:brightness(1.15)}
  .tb{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;padding:10px 12px;transition:color 0.2s;white-space:nowrap}
  .btn{cursor:pointer;transition:all 0.18s;border:none;font-family:'DM Mono',monospace}

  #app{max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}

  .timer-flash{animation:timer-done 0.6s ease-out 3}

  @keyframes timer-done{0%{box-shadow:0 0 0 0 rgba(106,255,59,0.6);transform:scale(1)}50%{box-shadow:0 0 0 8px rgba(106,255,59,0);transform:scale(1.04)}100%{box-shadow:0 0 0 0 rgba(106,255,59,0);transform:scale(1)}}

<script>
// ─── GLOBALS ──────────────────────────────────────────────────────────────────

let activeTab = 'overview';
let activeDay = 0; // will be set to today on init
let weekOffset = 0;
let expandedEx = null;
let expandedMeal = null;
let openMealSections = {};
let useMetric = true;

// ─── WEEKDAY MAPPING ──────────────────────────────────────────────────────────
// Maps JS day-of-week (0=Sun, 1=Mon, ..., 6=Sat) to PROGRAM index (0-6).
// Default: Mon→Push, Tue→Pull, Wed→Legs, Thu→Skills, Fri→Full Body, Sat→Active Recovery, Sun→Complete Rest.
const WEEKDAY_TO_ACTIVE_DAY = [6, 0, 1, 2, 3, 4, 5];
const WEEKDAY_LABELS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEEKDAY_LABELS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ─── TAB ACCENT PALETTE ───────────────────────────────────────────────────────
// Each tab has a signature colour for ambient context. Workout inherits the
// active day's accent (so Push day = yellow, Pull = cyan, etc.).
const TAB_ACCENTS = {
  overview: '#06d6a0',  // teal-green — control center
  fuel:     '#5fd463',  // fresh green — nutrition
  water:    '#3b9eff',  // clear blue
  sleep:    '#7c5cff',  // indigo — night
  shopping: '#ff9f3b',  // warm amber — groceries
  history:  '#888888'   // neutral grey — record
  // 'cycle': '#e85d9c' will go here when menstrual tracking lands
};

function getTabAccent(tab) {
  if (tab === 'train') return PROGRAM[activeDay].accent; // workouts inherit day colour
  return TAB_ACCENTS[tab] || '#06d6a0';
}

function getTodayWeekday() { return new Date().getDay(); }
function getTodayActiveDay() {
  // Use per-week override if we're viewing the current week (weekOffset == 0)
  // Otherwise use default mapping
  if (weekOffset === 0) {
    return getActiveDayForWeekday(getTodayWeekday());
  }
  return WEEKDAY_TO_ACTIVE_DAY[getTodayWeekday()];
}

// Returns weekday index for a given activeDay (PROGRAM index), respecting per-week reassignments
function getWeekdayForActiveDay(activeDayIdx) {
  return getWeekdayForActiveDayInWeek(activeDayIdx);
}

// Days since Monday for "this week" tracking (0 = Monday, 6 = Sunday)
function daysSinceMonday() {
  const dow = getTodayWeekday();
  return (dow + 6) % 7; // Mon→0, Tue→1, ..., Sun→6
}

function todayLocaleDate(opts) {
  return new Date().toLocaleDateString(undefined, opts || {weekday:'short', day:'numeric', month:'short'});
}

// Returns the Date object for the Monday that starts the week we're currently viewing.
function getWeekStartDate() {
  const d = new Date();
  const dow = d.getDay(); // 0=Sun..6=Sat
  const offsetToMon = (dow + 6) % 7; // days since this week's Monday
  d.setDate(d.getDate() - offsetToMon + (weekOffset * 7));
  d.setHours(0, 0, 0, 0);
  return d;
}

// Date for a given weekday (0=Sun..6=Sat) in the currently-viewed week.
function getDateForWeekday(weekday) {
  const monday = getWeekStartDate();
  const offset = (weekday + 6) % 7; // Mon→0, Tue→1, ..., Sun→6
  const d = new Date(monday);
  d.setDate(d.getDate() + offset);
  return d;
}

function formatShortDate(d) {
  return d.toLocaleDateString(undefined, {day:'numeric', month:'short'});
}

// ─── DAY ASSIGNMENT OVERRIDES (drag-to-reorder) ─────────────────────────────
// Stored as fraser_dayorder_w{offset} = array of activeDay indices in weekday order [Mon..Sun]
// Default order = [0,1,2,3,4,5,6] meaning Mon=Push, Tue=Pull, etc.

function getWeekDayOrder() {
  const key = 'fraser_dayorder_w' + weekOffset;
  const stored = localStorage.getItem(key);
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed) && parsed.length === 7) return parsed;
    } catch(e) {}
  }
  return [0, 1, 2, 3, 4, 5, 6]; // default Mon..Sun → activeDay 0..6
}

function setWeekDayOrder(order) {
  localStorage.setItem('fraser_dayorder_w' + weekOffset, JSON.stringify(order));
}

// Returns activeDay assigned to the given weekday (0=Sun..6=Sat) for current week
function getActiveDayForWeekday(weekday) {
  const order = getWeekDayOrder();
  const monIdx = (weekday + 6) % 7; // Mon→0, Tue→1, ..., Sun→6
  return order[monIdx];
}

function getWeekdayForActiveDayInWeek(activeDayIdx) {
  const order = getWeekDayOrder();
  for (let i = 0; i < 7; i++) {
    if (order[i] === activeDayIdx) {
      // i is Mon-indexed (0=Mon..6=Sun); convert to JS weekday (0=Sun..6=Sat)
      return (i + 1) % 7;
    }
  }
  return null;
}

function parseDurationFromReps(reps) {
  if (!reps) return null;
  const m = String(reps).match(/(\d+)(?:\s*-\s*(\d+))?\s*sec/i);
  if (!m) return null;
  return parseInt(m[2] || m[1], 10);
}

function getDefaultRestSec(ex) {
  const id = ex.id;
  // Heavy compounds — long rest
  if (['bench','dips','dbshoulder','wpullups','bbrow','squat','rdl','deadlift','dbbench'].indexOf(id) >= 0) return 180;
  // Skill work + bilateral leg work — moderate-long
  if (['muscleup','planche','frontlever','farmer','bulgariansplit'].indexOf(id) >= 0) return 120;
  // Volume work
  if (['ringrow','lunges','legpress','pikepush','bardips','bwpullups'].indexOf(id) >= 0) return 90;
  // Isolation, holds, finishers — short rest
  if (['laterals','tricep','curls','facepulls','calves','hangle','plank','pushupfinisher','lsit'].indexOf(id) >= 0) return 60;
  // Sprint intervals walk-back is the rest
  if (id === 'sprints') return 60;
  return 90;
}

// Parse a reps spec ("8-10", "12", "Max", "20 sec") into {min, max, isMax, isTime}.
function parseRepsSpec(reps) {
  if (!reps) return null;
  const s = String(reps).trim();
  if (/max/i.test(s)) return {isMax:true};
  if (/sec|min/i.test(s)) return {isTime:true};
  const m = s.match(/^(\d+)\s*(?:-\s*(\d+))?/);
  if (!m) return null;
  return { min: parseInt(m[1],10), max: parseInt(m[2]||m[1],10) };
}

// Pull last meaningful workout log for this exercise from previous weeks (look back up to 4).
// Skips empty logs. Returns {sets, weekOffset} or null.
function getPreviousExerciseLog(dayNum, exId) {
  for (let w = weekOffset - 1; w >= weekOffset - 4; w--) {
    const log = loadData('workout', w, dayNum) || {};
    const exLog = log[exId];
    if (!exLog || !exLog.sets) continue;
    const filledSets = (exLog.sets||[]).filter(s => s && (s.weight || s.reps));
    if (filledSets.length > 0) return {sets: exLog.sets, weekOffset: w};
  }
  return null;
}

// Decide if an exercise should suggest a progression based on the most recent prior week.
// Rules: every set has weight + reps logged, every set hits the top of the rep range,
// and no notes contain struggle keywords.
function getProgressionSuggestion(ex, prevSets) {
  if (!prevSets || prevSets.length === 0) return null;
  const repsSpec = parseRepsSpec(ex.reps);
  if (!repsSpec || repsSpec.isMax || repsSpec.isTime) return null;

  const struggleRx = /(fail|grind|hard|strug|barely|miss|form|tough|shaky|wobble|rep out|tweaked?|pain|sore|cramp)/i;
  const filled = prevSets.filter(s => s && s.weight && s.reps);
  if (filled.length < ex.sets) return null; // didn't complete all sets

  // All weights should be the same (top working weight)
  const weights = filled.map(s => parseFloat(s.weight)).filter(n => !isNaN(n));
  if (weights.length === 0) return null;
  const topWeight = Math.max(...weights);

  // All sets must hit the top of the rep range
  const allHitTop = filled.every(s => {
    const r = parseInt(s.reps, 10);
    return !isNaN(r) && r >= repsSpec.max;
  });
  if (!allHitTop) return null;

  // No struggle notes
  const hasStruggle = filled.some(s => s.note && struggleRx.test(s.note));
  if (hasStruggle) return null;

  // Suggest +2.5kg for upper body isolations / lighter, +5kg for heavy compounds
  const heavy = ['bench','dips','squat','rdl','deadlift','bbrow','wpullups','dbshoulder','dbbench','legpress'].indexOf(ex.id) >= 0;
  const bump = heavy ? 5 : 2.5;
  return { newWeight: +(topWeight + bump).toFixed(2), oldWeight: topWeight };
}

// Returns map of activeDay → status: 'today' | 'past_complete' | 'past_partial' | 'past_missed' | 'upcoming' | 'rest_day' | 'past_skipped'
function getWeekStatus() {
  const status = {};
  const today = getTodayActiveDay();
  const todayWd = getTodayWeekday();
  const isCurrentWeek = weekOffset === 0;
  const isFutureWeek = weekOffset > 0;
  const isPastWeek = weekOffset < 0;

  for (let ai = 0; ai < PROGRAM.length; ai++) {
    const day = PROGRAM[ai];
    const wd = getWeekdayForActiveDay(ai);
    // Use the actual week being viewed for data lookup
    const log = loadData('workout', weekOffset, day.day) || {};
    const setsLogged = Object.keys(log).reduce((acc, exId) => {
      const sets = log[exId] && log[exId].sets ? log[exId].sets : [];
      return acc + sets.filter(s => s && s.weight && s.reps).length;
    }, 0);
    const totalExercises = day.exercises ? day.exercises.length : 0;
    const skipped = !!loadData('skipped', weekOffset, day.day);
    const isRestDay = totalExercises === 0;

    if (isFutureWeek) {
      // Future weeks: nothing has happened yet, no "missed" concept
      status[ai] = isRestDay ? 'rest_day' : 'upcoming';
      continue;
    }

    if (isPastWeek) {
      // Past weeks: every day is past, evaluate purely on logs
      if (isRestDay) status[ai] = 'rest_day';
      else if (skipped) status[ai] = 'past_skipped';
      else if (setsLogged === 0) status[ai] = 'past_missed';
      else if (setsLogged < totalExercises * 2) status[ai] = 'past_partial';
      else status[ai] = 'past_complete';
      continue;
    }

    // Current week — relative to today
    if (ai === today) {
      status[ai] = 'today';
    } else if (isRestDay) {
      status[ai] = 'rest_day';
    } else if (skipped) {
      status[ai] = 'past_skipped';
    } else {
      const pos = (wd + 6) % 7;
      const todayPos = (todayWd + 6) % 7;
      if (pos < todayPos) {
        if (setsLogged === 0) status[ai] = 'past_missed';
        else if (setsLogged < totalExercises * 2) status[ai] = 'past_partial';
        else status[ai] = 'past_complete';
      } else {
        status[ai] = 'upcoming';
      }
    }
  }
  return status;
}

function getCatchUpInfo() {
  const status = getWeekStatus();
  const missed = [];
  Object.keys(status).forEach(ai => {
    if (status[ai] === 'past_missed' || status[ai] === 'past_partial') {
      missed.push(parseInt(ai, 10));
    }
  });
  // Priority order for catch-up: Legs > Push > Pull > Full Body > Skills
  // Map: Day 3 (Legs) > Day 1 (Push) > Day 2 (Pull) > Day 5 (Full Body) > Day 4 (Skills)
  const priority = {2: 1, 0: 2, 1: 3, 4: 4, 3: 5}; // activeDay → priority (lower = more important)
  const sorted = missed.slice().sort((a,b) => (priority[a]||99) - (priority[b]||99));
  return { missed: sorted, count: missed.length };
}

    chefNotes:{

      fixIts:"Salmon overcooked? Flake it into the sweet potato with extra lemon and call it a 'salmon bowl'. Glaze too salty? Stir in 1 tsp honey to balance.",

  "Greek Yoghurt + Blueberries + Almonds": {

      {step:"Spoon yoghurt into a bowl.", timer:0, tip:"Full-fat Greek yoghurt only — low-fat versions have starches added that interfere with the casein release that's the whole point of this snack."},
      {step:"Top with blueberries and crushed almonds.", timer:0, sensoryCheck:"Crush almonds yourself — pre-crushed go stale fast. Press with the side of a knife for irregular pieces (more textural variety than uniform chop).", tip:"A drizzle of raw honey (not heated) and a few flakes of sea salt elevate this from snack to dessert. The salt brings out the sweetness of the berries dramatically."}
    ],
    chefNotes:{

  // ─── MODERATE CARB DAY (Push/Pull) ────────────────────────────────────────
  "Scrambled Eggs + Sourdough + Avocado": {
    chefSteps:[
      {step:"Crack 3 eggs into a cold non-stick pan. Add a knob of butter. Place over LOW heat.", timer:0, sensoryCheck:"You're not aiming for 'sizzle' — you should barely hear anything for the first minute.", mistake:"High heat scrambled eggs = rubbery, weeping curd. Low and slow is the only way.", tip:"Cold pan + cold eggs is the Gordon Ramsay method — you're effectively cooking with the residual heat of the pan as it warms up.", why:"Eggs coagulate around 65°C. High heat overshoots, squeezing water out. Low heat = silky custard texture."},
      {step:"Stir continuously with a silicone spatula, scraping the bottom. After ~3 min, curds will form.", timer:240, sensoryCheck:"Curds should be loose, glossy, and look slightly underdone. Pull off heat 30 seconds before you think they're ready — carryover finishes them.", mistake:"Stirring once and walking away — you'll get a flat omelette, not soft curds. Constant motion = silky."},
      {step:"Toast sourdough until deeply golden — almost on the edge of charred.", timer:180, sensoryCheck:"Hard tap on the counter should produce a sharp 'clack' sound — that's structural integrity to hold the avocado.", mistake:"Light golden toast goes soggy in 60 seconds under wet ingredients.", tip:"Rub the hot toast with a halved garlic clove for the first 5 seconds — instant umami upgrade with zero effort."},
      {step:"Mash avocado on toast with a fork. Sea salt, lemon, pepper.", timer:0, tip:"Don't mash to a paste — leave chunky for texture. A ripe avocado yields slightly to gentle thumb pressure at the stem end. Hard = unripe, mushy = past it.", sensoryCheck:"After cutting, if it's brown inside, it's bruised but not bad — slice that part away."},
      {step:"Pile eggs on top of avocado toast. Crack pepper, sea salt flakes, optional chilli flakes.", timer:0, tip:"Salt at the END, not while cooking eggs. Salt added during cooking draws out water and gives a watery, bleeding scramble. Salt the moment they hit the plate."}
    ],
    chefNotes:{
      makeAhead:"This is a fresh-eat dish. The components don't reheat well.",
      swaps:"Burrata instead of avocado for an indulgent version. Whole-grain sourdough for more fibre. Goat's cheese crumbled on top is exceptional.",
      fixIts:"Eggs overcooked? Stir in 1 tsp cold butter or crème fraîche off-heat — re-emulsifies the texture. Avocado not ripe? Mash with a tsp of olive oil and a squeeze of lemon to loosen.",
      leftovers:"Don't try. Eggs and avocado degrade fast."
    }
  },

  "Tuna & Brown Rice Bowl": {
    chefSteps:[
      {step:"Rinse brown rice in cold water until water runs clear (~3 changes).", timer:90, sensoryCheck:"Last rinse should be barely cloudy.", mistake:"Skipping the rinse — surface starch makes brown rice gluey and clumpy.", tip:"Soak rinsed rice in cold water for 15 min before cooking — knocks 5 minutes off cook time and gives perfectly even grains."},
      {step:"Cook rice in 2:1 water ratio, low heat, lid on, 25-30 min. Don't lift the lid.", timer:1680, sensoryCheck:"When you can see steam-vents in the surface and the water is fully absorbed, kill the heat and let it rest covered for 10 minutes.", mistake:"Stirring brown rice mid-cook destroys the steam pockets that fluff the grains.", tip:"Add 1 tsp of olive oil and a bay leaf to the cooking water — the oil keeps grains separate, the bay leaf adds dimension."},
      {step:"Drain the tuna can, flake into a bowl. Mix with a little olive oil, lemon, salt, pepper.", timer:0, tip:"Tinned tuna in olive oil is FAR superior to tuna in water — better texture, deeper flavour, more healthy fats. Drain and use that oil as your dressing base.", mistake:"Buying chunk-light tuna for this — solid white albacore has the texture this dish needs."},
      {step:"Slice avocado, halve cherry tomatoes, slice cucumber. Arrange on rice.", timer:0, tip:"Slice avocado last and right before serving — exposed flesh oxidises in 5 minutes. A squeeze of lemon over the slices delays browning by 30+ minutes.", sensoryCheck:"For perfectly ripe avocado: gentle pressure at the stem end yields slightly. Hard = unripe."},
      {step:"Top rice with tuna, vegetables, sesame seeds, soy sauce drizzle.", timer:0, tip:"Build the bowl in distinct sections rather than mixed — visually more appealing and lets you control each bite. Drizzle soy sauce on the rice only, not the tuna (tuna is already seasoned).", why:"Sectioned bowls let you experience each ingredient's flavour individually before combining — restaurant technique called 'composed' plating."}
    ],
    chefNotes:{
      makeAhead:"Cook 4 cups of brown rice Sunday — lasts a week. Tuna assembly is 3 minutes from there.",
      swaps:"Salmon canned or fresh-cooked for variety. Quinoa instead of brown rice for higher protein. Edamame thrown in for plant protein boost.",
      fixIts:"Rice undercooked? Splash of water, lid back on, 5 more min. Tuna too dry? More olive oil and a tsp of mayo lifts the texture.",
      leftovers:"Bowl assembled (minus avocado) keeps overnight in the fridge — actually develops flavour. Add fresh avocado and lemon when eating."
    }
  },

  "Rice Cakes + Almond Butter + Banana": {
    chefSteps:[
      {step:"Toast rice cakes briefly under a grill or in a dry pan for 30 seconds per side.", timer:60, sensoryCheck:"They should smell distinctly nutty and look slightly golden — not white.", mistake:"Eating rice cakes straight out of the bag — they're flavourless and chalky cold.", tip:"This 30-second toast step is the entire game. It transforms rice cakes from styrofoam to genuinely tasty.", why:"Heat caramelises the surface starches. Same principle as toasting bread."},
      {step:"Spread almond butter generously on warm rice cakes.", timer:0, tip:"Apply almond butter while rice cakes are still warm — it spreads more easily and the cakes absorb a tiny amount of the oils, deepening the flavour."},
      {step:"Top with sliced banana, cinnamon, sea salt flakes.", timer:0, tip:"Slice banana on a steep diagonal for more surface area per slice. The sea salt is non-negotiable — it pulls the sweetness forward and balances the richness.", mistake:"Skipping the salt — sweet without salt tastes flat."}
    ],
    chefNotes:{
      makeAhead:"Toast rice cakes in batches of 6 — store in an airtight container, they keep crisp for 3 days.",
      swaps:"Sourdough crackers if you want more flavour. Cashew or peanut butter for variety. Apple instead of banana for lower-glycaemic version.",
      fixIts:"Rice cakes gone soft? Re-toast 60 seconds in a hot pan — back to crisp.",
      leftovers:"Don't pre-assemble — banana goes brown and rice cakes go soggy in 20 minutes."
    }
  },

  "Harissa Chicken Thighs + Brown Rice + Roasted Veg": {
    chefSteps:[
      {step:"Marinate chicken thighs in harissa paste, olive oil, lemon juice, garlic, salt for at least 30 min (overnight is better).", timer:1800, sensoryCheck:"Marinade should coat each thigh in a thick deep-red paint — if it's runny, add more harissa.", mistake:"Marinating less than 20 minutes is barely flavouring the surface. The salt needs time to penetrate.", tip:"Add a teaspoon of honey to the marinade — it doesn't make it sweet, but it dramatically improves caramelisation in the pan/oven.", why:"Harissa is high in salt and acid — both penetrate protein fibres over time. 30+ min unlocks deep flavour."},
      {step:"Toss vegetables (bell peppers, courgette, red onion) in olive oil, salt, cumin, paprika. Spread on a tray.", timer:120, mistake:"Crowding the tray. Vegetables steam instead of caramelising if they touch.", tip:"Cut vegetables in roughly the same size — 2cm chunks for everything. Mixed sizes = some burnt, some raw."},
      {step:"Roast vegetables at 220°C for 20 minutes, turning once at the 15-min mark.", timer:1200, sensoryCheck:"Edges should be deeply browned with some genuinely charred bits. Pale roasted veg is just steamed veg in a hot oven.", tip:"Add a halved head of garlic to the tray (cut side down) — it roasts into a sweet, jammy spreadable garlic that you can squeeze over the chicken at the end."},
      {step:"Heat heavy pan medium-high. Sear chicken thighs skin-side down 6-7 min without moving.", timer:420, sensoryCheck:"Deep mahogany crust on the skin side. Sound should be a steady aggressive sizzle, not just a hiss.", mistake:"Flipping early or wiggling the pan to 'check' the underside. Stay out of its way.", tip:"If using boneless thighs, place a smaller heavy pan on top during the sear — presses the skin flat and crisps it evenly. Game-changer."},
      {step:"Flip thighs, cook 4-5 min more, finish in oven if needed until 75°C internal.", timer:300, sensoryCheck:"Juices should run clear when pierced with a knife. The thickest part should feel firm with slight bounce.", mistake:"Trusting the timer alone — chicken thigh thickness varies. Use a thermometer or the press test.", tip:"Don't move thighs to a plate immediately — let them rest IN the pan off-heat for 3 minutes. The fond at the bottom continues to caramelise the skin."},
      {step:"Cook brown rice (use the rinse + soak method from the Tuna recipe).", timer:1680, tip:"For this dish, cook the rice with a cinnamon stick and a few cloves — the warm spices echo the harissa beautifully."},
      {step:"Plate rice, vegetables, chicken on top. Drizzle the pan juices over everything.", timer:0, tip:"That dark sticky stuff in the pan after cooking the chicken is liquid gold. Add 2 tbsp of water, scrape with a wooden spoon for 20 seconds, and drizzle. This is the difference between home cooking and restaurant cooking.", why:"Those caramelised proteins (the 'fond') contain massive flavour concentration. Throwing them away is the most common amateur mistake."}
    ],
    chefNotes:{
      makeAhead:"Marinate chicken Sunday for the whole week. Roasted veg keeps 4 days. Cook brown rice in big batches.",
      swaps:"Chicken breast for leaner — but reduce cook time by 2 min and watch for 70°C. Lamb leg steaks if you want richer. Rose harissa for a sweeter, milder paste.",
      fixIts:"Chicken too dry? Slice and toss with the pan juices and a squeeze of lemon. Veg burnt? Pick out the worst bits, the rest is fine. Rice undercooked? Splash water, lid on, 5 min more.",
      leftovers:"Outstanding next day. Reheat chicken in the pan with 2 tbsp water, lid on, low heat for 4 minutes. Microwave dries it out."
    }
  },

  "Greek Yoghurt + Strawberries + Walnuts": {
    chefSteps:[
      {step:"Spoon yoghurt into a bowl.", timer:0, tip:"Take it out of the fridge 5 minutes before — slightly warmer yoghurt tastes far creamier."},
      {step:"Slice strawberries, top yoghurt. Add walnuts.", timer:0, tip:"Toast the walnuts in a dry pan for 3-4 minutes until fragrant — raw walnuts are bitter, toasted are sweet and rich. Game-changing for 60 seconds of effort.", mistake:"Using whole walnuts — break or roughly chop so each spoonful gets some.", sensoryCheck:"You'll know they're toasted when they smell like buttery popcorn."}
    ],
    chefNotes:{
      makeAhead:"Toast walnuts in batches — they keep crisp for 2 weeks in an airtight jar.",
      swaps:"Pecans for a sweeter profile. Frozen mixed berries (defrosted) for a higher antioxidant load.",
      fixIts:"Walnuts gone bitter? They've gone rancid. Check the smell — should be sweet, not paint-like.",
      leftovers:"Don't pre-mix."
    }
  },

  // ─── LOW CARB DAY (Skills) ────────────────────────────────────────────────
  "Protein Pancakes + Berries + Greek Yoghurt": {
    chefSteps:[
      {step:"Mash banana thoroughly in a bowl. Whisk in eggs and protein powder.", timer:60, sensoryCheck:"Batter should be thicker than crepe batter, looser than American pancake batter — like yogurt consistency.", mistake:"Using under-ripe banana — only spotty/brown bananas have the sweetness and binding.", tip:"Add a pinch of baking powder if you want them fluffy rather than dense. A splash of vanilla extract elevates the flavour dramatically.", why:"Ripe banana provides sugars + binding. Eggs provide protein + structure. Together they emulsify into a stable batter."},
      {step:"Heat a non-stick pan medium-low with a tiny knob of coconut oil.", timer:30, sensoryCheck:"Test by flicking a drop of batter in — should sizzle gently but not aggressively brown in 5 seconds.", mistake:"Pan too hot — outside burns before inside cooks. These pancakes need patience.", tip:"Coconut oil is critical here — adds a faint sweetness that complements the banana. Butter works but olive oil tastes wrong."},
      {step:"Pour 2-3 small rounds (smaller than American pancakes — they're more fragile).", timer:30, mistake:"Making them big — protein pancakes don't have gluten, so they fall apart when flipped if they're palm-sized. Half-palm is the sweet spot."},
      {step:"Cook 2-3 min until bubbles form on top and edges look set. Flip carefully with a wide spatula.", timer:180, sensoryCheck:"Bubbles forming and HOLDING (not just popping immediately) means the underside is set.", mistake:"Flipping too early — these pancakes have less structure than wheat-flour ones. Wait until you can confidently slide the spatula under without crumbling.", tip:"Use the biggest spatula you own. Slide all the way under, lift confidently, flip in one motion. Hesitation = broken pancake."},
      {step:"Cook 1-2 min more. Stack, top with yoghurt and berries.", timer:90, tip:"A drizzle of warm honey and a tiny pinch of sea salt on top transforms these — the salt makes the banana flavour pop.", why:"Banana has lots of natural sugar — high heat past this point caramelises it into bitterness."}
    ],
    chefNotes:{
      makeAhead:"Cook a double batch on Sunday — they reheat in 60 seconds in a pan with a tiny bit of oil. Don't microwave (rubbery).",
      swaps:"Cottage cheese for some of the yoghurt = ultra-high protein. Almond flour added (1 tbsp) gives more structure. Frozen berries (defrosted) for off-season.",
      fixIts:"Falling apart? Add 1 tbsp of oats or almond flour to the batter — provides binding. Too dense? Pinch more baking powder.",
      leftovers:"Excellent cold the next day with peanut butter — basically banana bread."
    }
  },

  "Turkey Mince Taco Bowl": {
    chefSteps:[
      {step:"Heat oil in a heavy pan medium-high. Add turkey mince and let it sit for 90 seconds before stirring.", timer:90, sensoryCheck:"You'll hear an aggressive sear, and the mince should be deeply browned on the bottom when you finally stir.", mistake:"Stirring immediately — the mince steams in its own water and never browns. Maillard reaction needs dry contact with hot metal.", tip:"Spread the mince thin across the entire pan, then leave it alone. After it has crusted, break it up.", why:"Turkey is leaner than beef, which means less fat to lubricate browning. You have to be more aggressive with heat to get colour."},
      {step:"Break up the mince with a spatula, add taco seasoning (cumin, paprika, chilli, garlic, oregano). Cook 4-5 min more.", timer:300, mistake:"Adding wet ingredients (tomato, lime) at this stage — it'll deglaze the pan and you lose the crust.", tip:"Toast the spices for 30 seconds in the dry pan BEFORE adding the mince. Releases volatile oils for 10x flavour."},
      {step:"Stir in tomato paste, cook 60 seconds. Add a splash of stock or water.", timer:60, sensoryCheck:"Sauce should be glossy and clinging to the meat — not soupy.", tip:"Cook the tomato paste DARK before adding liquid — it should look almost burnt at the edges. This concentrates the umami.", mistake:"Adding tomato paste with the liquid simultaneously — you skip the browning step that gives it depth."},
      {step:"Cook brown rice (or cauliflower rice for lower carb).", timer:1680, tip:"For this bowl, cauliflower rice is genuinely better — soaks up the meat juices without competing on flavour."},
      {step:"Char a few cherry tomatoes and corn kernels in a dry hot pan for 2-3 min.", timer:180, mistake:"Skipping this step — raw tomato and corn taste bland next to the meat. Charring adds smoky depth.", tip:"Heat the pan ROCKET hot, drop in the tomatoes, don't move them. Listen for a pop — that's the skin blistering."},
      {step:"Build the bowl: rice base, mince, charred veg, avocado, lime, coriander, hot sauce.", timer:0, tip:"Squeeze the lime over the BOWL not into the meat — the bright fresh acidity is what makes this taste alive. Cooked-in lime tastes flat. Always finish with citrus.", why:"Acid is one of the four foundational flavour elements (with salt, fat, heat). Always added at the end for maximum impact."}
    ],
    chefNotes:{
      makeAhead:"Cook the seasoned mince Sunday — it's outstanding all week. Add fresh acid (lime) and herbs when serving.",
      swaps:"Beef mince for richer (5% fat works). Chicken mince for leaner. Lentils for plant-based — same technique.",
      fixIts:"Mince too dry? Splash of stock and a pat of butter off-heat. Too greasy (with beef)? Drain after browning.",
      leftovers:"Better day 2. Reheat in a pan with a splash of water. The flavours deepen overnight."
    }
  },

  "Apple + Almond Butter": {
    chefSteps:[
      {step:"Slice apple into wedges.", timer:0, tip:"Granny Smith for tart-sweet contrast with almond butter. Pink Lady if you want sweeter. Crisp apples > soft apples for this snack.", sensoryCheck:"Apple should snap audibly when bitten — if it doesn't, it's mealy and past its prime."},
      {step:"Spread almond butter on each wedge or dip.", timer:0, tip:"A tiny pinch of cinnamon and sea salt on top of the almond butter elevates this from snack to genuinely satisfying. Salt + nut butter is a transformation.", mistake:"Using sugary commercial almond butter — read labels. Should be almonds + maybe salt. That's it."}
    ],
    chefNotes:{
      makeAhead:"Slice apple just before eating — pre-sliced browns in 10 minutes (lemon juice slows it).",
      swaps:"Pear, apple's slightly sweeter cousin. Cashew butter for milder, smoother. Tahini for nut-free.",
      fixIts:"Apple gone soft? Eat in oats instead.",
      leftovers:"None — eat fresh."
    }
  },

  "Barramundi + Roasted Veg + Quinoa": {
    chefSteps:[
      {step:"Cube vegetables (zucchini, bell pepper, red onion). Toss with olive oil, salt, lemon zest, fresh thyme. Roast at 220°C 20 min.", timer:1200, sensoryCheck:"Edges should be deeply caramelised — borderline charred for the onion specifically. Onion sweetens dramatically when blackened.", tip:"Lemon zest + roasted veg is criminally underused. The oils caramelise and infuse the whole tray with citrus brightness.", mistake:"Crowding the tray. Single layer, no overlap."},
      {step:"Cook quinoa (rinse + toast method) with stock instead of water.", timer:840, tip:"Add a few sprigs of thyme to the cooking quinoa — same herb profile as the veg ties the dish together. This is restaurant-level flavour layering."},
      {step:"Pat barramundi DRY with paper towel. Salt the flesh side. Heat pan medium-high with oil.", timer:60, sensoryCheck:"Oil should shimmer but not smoke. If it smokes, pull the pan off heat for 30 seconds.", mistake:"Cooking wet fish — water = steam = no crust. Patting dry is the difference between flabby and crispy.", tip:"Score the skin with 3 shallow cuts (just through the skin, not the flesh) to prevent curling."},
      {step:"Place fish SKIN-SIDE DOWN. Press flat with a spatula for 10 seconds.", timer:240, sensoryCheck:"Confident sizzle, the fish flesh visibly turns opaque from the bottom up. The skin will release from the pan when it's ready — don't force it.", mistake:"Trying to flip too early. If it sticks, it's not done. Wait 30 more seconds and try again."},
      {step:"Cook skin-side 3-4 min, then flip and cook flesh side 1-2 min. Pull at 60°C internal.", timer:120, sensoryCheck:"Flakes when nudged with a fork, but moist looking — not opaque-and-dry.", tip:"For barramundi specifically, the skin is the best part — don't be afraid of high heat to crisp it. The flesh is delicate so it cooks fast."},
      {step:"Plate quinoa, top with roasted veg, fish on top. Lemon wedge, fresh herbs (parsley or dill).", timer:0, tip:"Squeeze lemon over the FISH at the table, not in the kitchen — the citrus volatiles dissipate in 60 seconds. Fresh squeeze = bright; pre-squeezed = flat."}
    ],
    chefNotes:{
      makeAhead:"Quinoa and roasted veg keep 4 days. Cook fish fresh — fish reheated is a tragedy.",
      swaps:"Snapper, sea bass, or trout work identically. Cauliflower rice for lower carb.",
      fixIts:"Skin not crispy? Pan wasn't hot enough or fish was wet. Next time, hotter pan, drier fish. Fish dry? Slice thin and toss with the lemon zest from the veg roast.",
      leftovers:"Flake leftover fish into the quinoa with extra lemon and olive oil = lunch the next day."
    }
  },

      {step:"Spoon yoghurt into a bowl.", timer:0, tip:"Slightly chilled, not freezing — pull it out 5 minutes before."},

    chefNotes:{

    }
  },

  // ─── REST DAY ─────────────────────────────────────────────────────────────

      {step:"Pour into a bowl. Top with granola, fresh berries, sliced banana, chia seeds.", timer:0, tip:"Toppings on the EDGES, not centred. Visual rule: outer ring of crunch, inner pool of smoothie. Looks better, eats better.", mistake:"Over-loading toppings — you should still see smoothie underneath. Restraint = restaurant aesthetic."}

  "Mediterranean Chicken Salad": {
    chefSteps:[
      {step:"Season chicken breast: salt, pepper, oregano, lemon zest. Rest 10 min.", timer:600, mistake:"Skipping the salt-rest — salt needs time to penetrate. Salting and immediately cooking just seasons the surface.", tip:"Pound the chicken to even thickness (~1.5cm) before seasoning. Even thickness = even cook = no dry edges."},
      {step:"Sear chicken 4-5 min per side in a hot pan with olive oil. Pull at 71°C.", timer:540, sensoryCheck:"Don't flip until the bottom is golden-brown and releases easily. If it sticks, wait 30 more seconds.", mistake:"Cutting into chicken to check if done — every cut bleeds moisture. Use a thermometer.", tip:"Squeeze half a lemon directly into the pan in the last 30 seconds of cooking — the juice deglazes and creates a quick pan sauce."},
      {step:"Rest chicken 5 min, then slice against the grain.", timer:300, why:"Resting redistributes juices that have been pushed to the centre by heat. Slicing immediately = juice on board, dry chicken on plate.", tip:"Against the grain = perpendicular to the visible muscle striations. This is the single most underrated chicken technique."},
      {step:"Build salad: greens, cucumber, cherry tomatoes, olives, feta, red onion.", timer:0, tip:"Salt the cucumber slices for 5 minutes BEFORE adding to the salad — draws out water and concentrates flavour. Pat dry then mix in.", mistake:"Adding raw red onion without doing anything to it — too sharp. Soak in cold water for 10 min to mellow."},
      {step:"Whisk dressing: olive oil, lemon, dijon, garlic, oregano, salt, pepper.", timer:0, tip:"3:1 ratio of oil to acid. Always season the dressing — under-seasoned dressing = under-seasoned salad. Taste before tossing.", sensoryCheck:"Dressing should taste assertively bright at first taste — it'll mellow when distributed."},
      {step:"Slice chicken on top of the salad, drizzle dressing, optional flaky salt.", timer:0, tip:"Dress the salad just before serving, not 10 minutes ahead — greens wilt fast when dressed."}
    ],
    chefNotes:{
      makeAhead:"Cook chicken Sunday — it'll cold-slice for the whole week. Pre-make the dressing in a jar.",
      swaps:"Grilled halloumi instead of chicken for vegetarian. Salmon flaked over for omega-3 boost. Chickpeas for plant protein.",
      fixIts:"Chicken dry? Slice ultra-thin, toss with extra dressing. Greens wilted? Ice-water bath for 60 seconds revives them.",
      leftovers:"Keeps overnight if undressed. Dress just before eating."
    }
  },

  "Salmon + Sweet Potato + Roasted Veg": {
    chefSteps:[
      {step:"Cube sweet potato (~2cm). Toss with olive oil, salt, smoked paprika. Spread on tray.", timer:120, mistake:"Crowding. Single layer with space between cubes.", tip:"A tiny drizzle of maple syrup over the sweet potato before roasting accentuates the natural sugars and creates deeper caramelisation."},
      {step:"Roast sweet potato at 220°C for 22-25 min, undisturbed for first 15 min.", timer:1380, sensoryCheck:"Edges deeply caramelised, almost charred. Inside fork-tender.", why:"High heat + no movement = sustained contact with the hot pan = char. Same principle as your sweet potato beef rump bowl."},
      {step:"Toss broccoli, bell pepper, asparagus in olive oil, salt, garlic. Add to oven for last 12 min.", timer:720, mistake:"Adding all veg at the start — different cook times. Sweet potato needs 22+, asparagus needs 8.", tip:"Squeeze lemon juice over the asparagus right when it comes out of the oven — adds brightness without losing the roast flavour."},
      {step:"Season salmon: salt, pepper, lemon zest. Pat dry.", timer:60, mistake:"Salmon too cold straight from the fridge — uneven cook. Let it sit at room temp 15 min before cooking."},
      {step:"Sear salmon skin-side down in hot pan 3-4 min, flip, 2 min more. Pull at 50°C.", timer:300, sensoryCheck:"Crispy skin, flesh just barely opaque, slight translucent line down the middle for medium.", tip:"Press the salmon flat with a spatula for the first 15 seconds skin-side down — eliminates the curl, ensures uniform crispy skin."},
      {step:"Plate sweet potato, veg, salmon. Lemon wedge, fresh dill.", timer:0, tip:"Fresh dill is the most underrated salmon herb. Tear (don't chop) and scatter just before serving — chopping bruises and oxidises the leaves."}
    ],

  } catch(e) { return null; }
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children.flat()) {
    if(c==null||c===false) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}

function div(style,...children) { return el('div',{style},...children); }
function span(style,text)       { return el('span',{style},text); }
function bebas(size,color,text) { return el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:size+'px',color,letterSpacing:'0.04em',lineHeight:'1'}},text); }

function formatIngredient(ingredient) {
  if (!useMetric) {
    return ingredient.a + ' ' + (ingredient.u || '') + ' ' + ingredient.n;
  } else {
    return ingredient.m + ' ' + (ingredient.mu || '') + ' ' + ingredient.n;
  }
}

function formatTime(seconds) {
  if (seconds < 60) return seconds + 's';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return secs > 0 ? mins + 'm ' + secs + 's' : mins + 'm';
}

// ─── TIMER FUNCTIONS ──────────────────────────────────────────────────────────

const activeTimers = {}; // id -> {intervalId, remaining, total, button, descId}
let audioCtx = null;
let notificationPermissionAsked = false;

function ensureAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  // Resume if suspended (iOS requires user interaction)
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(()=>{});
  }
  return audioCtx;
}

function playAlarmBeep() {
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  // Three rising beeps
  const playBeep = (freq, startTime, duration) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  };
  const now = ctx.currentTime;
  playBeep(880, now, 0.18);
  playBeep(880, now + 0.25, 0.18);
  playBeep(1320, now + 0.5, 0.4);
  // Vibrate too (Android mostly)
  if (navigator.vibrate) {
    try { navigator.vibrate([200, 100, 200, 100, 400]); } catch(e) {}
  }
}

function maybeShowNotification(description) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    try { new Notification('Timer Complete', { body: description, silent: false }); } catch(e) {}
  } else if (Notification.permission !== 'denied' && !notificationPermissionAsked) {
    notificationPermissionAsked = true;
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') {
        try { new Notification('Timer Complete', { body: description, silent: false }); } catch(e) {}
      }
    }).catch(()=>{});
  }
}

function formatTimerDisplay(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return mins + ':' + (secs < 10 ? '0' + secs : secs);
}

function buildTimerButton(seconds, description, opts) {
  opts = opts || {};
  const mode = opts.mode || 'inline'; // 'inline' | 'fullscreen'
  const accent = opts.accent || '#ff6b35';
  const id = 'tm_' + Math.random().toString(36).substr(2, 9);
  const btn = el('button', {
    id: id,
    class: 'btn timer-btn',
    'data-state': 'idle',
    'data-total': seconds + '',
    'data-remaining': seconds + '',
    'data-mode': mode,
    'data-accent': accent,
    style: {
      position: 'relative',
      background: '#141414',
      color: '#ebebeb',
      border: '1px solid #2a2a2a',
      borderRadius: '18px',
      padding: '5px 12px 5px 9px',
      fontSize: '11px',
      marginTop: '8px',
      fontFamily: "'DM Mono',monospace",
      display: 'inline-flex',
      alignItems: 'center',
      gap: '6px',
      cursor: 'pointer',
      transition: 'all 0.2s',
      overflow: 'hidden'
    },
    onclick: (e) => {
      e.stopPropagation();
      // Need to lift audio ctx on this gesture for iOS
      ensureAudioCtx();
      if (mode === 'fullscreen') {
        openFullscreenTimer(seconds, description, accent, opts.kind || 'rest', opts.chainTo || null);
      } else {
        handleTimerClick(id, seconds, description);
      }
    }
  });
  // Progress fill layer (sits under the content)
  btn.appendChild(el('span', {
    class: 'timer-fill',
    style: {
      position: 'absolute',
      top: '0', left: '0', bottom: '0',
      width: '0%',
      background: 'linear-gradient(90deg, ' + accent + '22, ' + accent + '44)',
      transition: 'width 1s linear',
      pointerEvents: 'none',
      zIndex: '0'
    }
  }));
  const icon = el('span', {
    class: 'timer-icon',
    style: { color: accent, fontSize: '11px', lineHeight: '1', position: 'relative', zIndex: '1' }
  }, mode === 'fullscreen' ? '⛶' : '▷');
  const text = el('span', {
    class: 'timer-text',
    style: { color: '#ebebeb', position: 'relative', zIndex: '1' }
  }, formatTimerDisplay(seconds));
  btn.appendChild(icon);
  btn.appendChild(text);
  btn.setAttribute('data-description', description);
  return btn;
}

    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center'
  });

  const radius = (dialSize / 2) - 18;
  const circumference = 2 * Math.PI * radius;
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', dialSize);
  svg.setAttribute('height', dialSize);
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';
  // SVG starts at 12 o'clock by default with this rotation
  svg.style.transform = 'rotate(-90deg)';

  // ─── TOTEM RING ─────────────────────────────────────────────────────────
  // Custom tribal-minimalist countdown ring: 60 radial bars, every 5th heavier,
  // cardinal anchor glyphs at 12/3/6/9. Bars deplete from the trailing edge as
  // time passes, fading to ghost-marks (15% opacity) so the pattern remains
  // visible as a static totem while the active arc is unmistakable.
  const cx = dialSize / 2, cy = dialSize / 2;
  const BAR_COUNT = 60;
  const ringBars = []; // refs for tick-time updates
  const innerRadius = radius - 6;   // base bar inner edge
  const outerRadius = radius + 6;   // base bar outer edge
  const heavyExtra = 4;              // extra length for every-5th bar

  for (let i = 0; i < BAR_COUNT; i++) {
    const angle = (i / BAR_COUNT) * 2 * Math.PI;
    const isHeavy = i % 5 === 0;
    const isCardinal = i === 0 || i === 15 || i === 30 || i === 45;
    // Cardinal positions get a custom glyph (handled below); skip drawing a bar there
    if (isCardinal) continue;

    const r1 = innerRadius;
    const r2 = outerRadius + (isHeavy ? heavyExtra : 0);
    const x1 = cx + r1 * Math.cos(angle);
    const y1 = cy + r1 * Math.sin(angle);
    const x2 = cx + r2 * Math.cos(angle);
    const y2 = cy + r2 * Math.sin(angle);

    const bar = document.createElementNS(svgNS, 'line');
    bar.setAttribute('x1', x1); bar.setAttribute('y1', y1);
    bar.setAttribute('x2', x2); bar.setAttribute('y2', y2);
    bar.setAttribute('stroke', '#000');
    bar.setAttribute('stroke-width', isHeavy ? '3' : '2');
    bar.setAttribute('stroke-linecap', 'round');
    bar.setAttribute('opacity', '1');
    bar.style.transition = 'opacity 0.4s ease, stroke-width 0.3s';
    svg.appendChild(bar);
    ringBars.push({el: bar, index: i, isHeavy: isHeavy});
  }

  // Cardinal anchor glyphs — replace bars at 12/3/6/9 with totemic markers
  // 12 o'clock (top): solid downward triangle pointing inward
  // 6 o'clock (bottom): solid upward triangle pointing inward
  // 3 and 9: stacked twin squares (asymmetric character)
  const drawTriangle = (centerX, centerY, dir) => {
    // dir: 'down' for top (points inward), 'up' for bottom (points inward)
    const s = 8;
    const tip = dir === 'down' ? [centerX, centerY + s] : [centerX, centerY - s];
    const left = dir === 'down' ? [centerX - s, centerY - s] : [centerX - s, centerY + s];
    const right = dir === 'down' ? [centerX + s, centerY - s] : [centerX + s, centerY + s];
    const tri = document.createElementNS(svgNS, 'polygon');
    tri.setAttribute('points', `${tip[0]},${tip[1]} ${left[0]},${left[1]} ${right[0]},${right[1]}`);
    tri.setAttribute('fill', '#000');
    return tri;
  };
  const drawTwinSquares = (centerX, centerY, isHorizontal) => {
    // A pair of stacked squares — asymmetric totemic anchor
    const g = document.createElementNS(svgNS, 'g');
    const big = document.createElementNS(svgNS, 'rect');
    const small = document.createElementNS(svgNS, 'rect');
    if (isHorizontal) {
      // 3 or 9 o'clock — squares stacked horizontally
      big.setAttribute('x', centerX - 7); big.setAttribute('y', centerY - 4);
      big.setAttribute('width', 8); big.setAttribute('height', 8);
      small.setAttribute('x', centerX + 3); small.setAttribute('y', centerY - 2);
      small.setAttribute('width', 4); small.setAttribute('height', 4);
    }
    big.setAttribute('fill', '#000');
    small.setAttribute('fill', '#000');
    g.appendChild(big); g.appendChild(small);
    return g;
  };

  // 12 o'clock: triangle pointing toward centre (downward, since 12 is at top)
  svg.appendChild(drawTriangle(cx, cy - outerRadius - heavyExtra, 'down'));
  // 6 o'clock: triangle pointing toward centre (upward, since 6 is at bottom)
  svg.appendChild(drawTriangle(cx, cy + outerRadius + heavyExtra, 'up'));
  // 3 o'clock: twin squares (right side)
  svg.appendChild(drawTwinSquares(cx + outerRadius + heavyExtra, cy, true));
  // 9 o'clock: twin squares mirrored (left side)
  const leftTwin = drawTwinSquares(cx, cy, true);
  // Mirror by flipping x — easier to redraw than transform
  while (leftTwin.firstChild) leftTwin.removeChild(leftTwin.firstChild);
  const big9 = document.createElementNS(svgNS, 'rect');
  big9.setAttribute('x', cx - outerRadius - heavyExtra - 1);
  big9.setAttribute('y', cy - 4);
  big9.setAttribute('width', 8); big9.setAttribute('height', 8);
  big9.setAttribute('fill', '#000');
  const small9 = document.createElementNS(svgNS, 'rect');
  small9.setAttribute('x', cx - outerRadius - heavyExtra - 7);
  small9.setAttribute('y', cy - 2);
  small9.setAttribute('width', 4); small9.setAttribute('height', 4);
  small9.setAttribute('fill', '#000');
  leftTwin.appendChild(big9); leftTwin.appendChild(small9);
  svg.appendChild(leftTwin);

  // Hidden progCircle kept in state for compatibility — we won't render it,
  // but fsTick still computes circumference-based progress. We use ringBars instead.
  const progCircle = { setAttribute: () => {}, style: {} }; // stub for legacy code paths
  
  dialWrap.appendChild(svg);

  // Inner content — number in black Bebas
  const inner = div({
    position: 'relative',
    zIndex: '2',
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    gap: '8px'
  });
  const numberEl = el('div', {
    id: 'fs-number',
    style: {
      fontFamily: "'Anton', 'Bebas Neue', sans-serif",
      fontSize: Math.floor(dialSize * 0.36) + 'px',
      color: '#000',
      letterSpacing: '-0.01em',
      lineHeight: '1',
      fontWeight: '400',
      WebkitTextStroke: '1px #000',
      textTransform: 'none'
    }
  }, formatTimerDisplay(totalSec));
  inner.appendChild(numberEl);
  inner.appendChild(el('div', {
    id: 'fs-state',
    style: {
      fontSize: '9px',
      color: '#000',
      letterSpacing: '0.3em',
      textTransform: 'uppercase',
      fontFamily: "'DM Mono', monospace",
      fontWeight: '700',
      opacity: '0.5'
    }
  }, 'TAP TO START'));
  dialWrap.appendChild(inner);
  overlay.appendChild(dialWrap);

  // Bottom hint
  overlay.appendChild(el('div', {
    id: 'fs-hint',
    style: {
      position: 'absolute',
      bottom: 'calc(env(safe-area-inset-bottom, 16px) + 32px)',
      left: '0', right: '0',
      textAlign: 'center',
      fontSize: '8px',
      color: '#000',
      letterSpacing: '0.28em',
      textTransform: 'uppercase',
      fontFamily: "'DM Mono', monospace",
      opacity: '0.4'
    }
  }, 'TAP TO START  ·  HOLD TO CANCEL'));

  // Press handlers
  let pressTimer = null;
  overlay.addEventListener('pointerdown', (e) => {
    if (e.target === closeBtn || closeBtn.contains(e.target)) return;
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (navigator.vibrate) { try { navigator.vibrate(40); } catch(_){} }
      closeFullscreenTimer();
    }, 700);
  });
  overlay.addEventListener('pointerup', (e) => {
    if (e.target === closeBtn || closeBtn.contains(e.target)) return;
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
      handleFsTap();
    }
  });
  overlay.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });
  overlay.addEventListener('pointerleave', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

  document.body.appendChild(overlay);

  fsTimerState = {
    totalSec: totalSec,
    remainingSec: totalSec,
    isRunning: false,
    isPaused: false,
    inChainBuffer: false,
    intervalId: null,
    bufferIntervalId: null,
    accent: accent,
    fillColor: fillColor,
    kind: kind,
    description: description,
    progCircle: progCircle,
    circumference: circumference,
    ringBars: ringBars,
    barCount: BAR_COUNT,
    wakeLock: null,
    hasBeepedAt: {},
    chainTo: chainTo || null
  };
}

function handleFsTap() {
  if (!fsTimerState) return;
  if (fsTimerState.inChainBuffer) {
    skipChainBuffer();
    return;
  }
  if (!fsTimerState.isRunning) {
    fsStart();
  } else if (fsTimerState.isPaused) {
    fsResume();
  } else {
    fsPause();
  }
}

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return null;
  try {
    return await navigator.wakeLock.request('screen');
  } catch (e) {
    return null;
  }
}

async function fsStart() {
  if (!fsTimerState) return;
  fsTimerState.isRunning = true;
  fsTimerState.isPaused = false;
  fsTimerState.startedAt = Date.now();
  fsTimerState.endAt = Date.now() + (fsTimerState.remainingSec * 1000);
  fsTimerState.hasBeepedAt = {};

  fsTimerState.wakeLock = await requestWakeLock();

  const stateEl = document.getElementById('fs-state');
  if (stateEl) { stateEl.textContent = 'IN PROGRESS'; stateEl.style.opacity = '0.7'; }

  const hintEl = document.getElementById('fs-hint');
  if (hintEl) hintEl.textContent = 'TAP TO PAUSE  ·  HOLD TO CANCEL';

  fsTick();
  fsTimerState.intervalId = setInterval(fsTick, 200);
}

function fsPause() {
  if (!fsTimerState || !fsTimerState.isRunning || fsTimerState.isPaused) return;
  fsTimerState.isPaused = true;
  fsTimerState.remainingSec = Math.max(0, Math.round((fsTimerState.endAt - Date.now()) / 1000));
  if (fsTimerState.intervalId) clearInterval(fsTimerState.intervalId);
  fsTimerState.intervalId = null;

  const stateEl = document.getElementById('fs-state');
  if (stateEl) stateEl.textContent = 'PAUSED · TAP TO RESUME';
  // Pulse the active bars by reducing their opacity — paused but recoverable
  if (fsTimerState.ringBars) {
    fsTimerState.ringBars.forEach(({el, index}) => {
      if (parseFloat(el.getAttribute('opacity')) > 0.5) {
        el.setAttribute('opacity', '0.45');
      }
    });
  }
}

function fsResume() {
  if (!fsTimerState || !fsTimerState.isPaused) return;
  fsTimerState.isPaused = false;
  fsTimerState.endAt = Date.now() + (fsTimerState.remainingSec * 1000);
  // Restore active bars to full opacity (fsTick will refine on next tick)
  if (fsTimerState.ringBars) {
    fsTimerState.ringBars.forEach(({el}) => {
      if (parseFloat(el.getAttribute('opacity')) > 0.2) {
        el.setAttribute('opacity', '1');
      }
    });
  }
  const stateEl = document.getElementById('fs-state');
  if (stateEl) stateEl.textContent = 'IN PROGRESS';
  fsTick();
  fsTimerState.intervalId = setInterval(fsTick, 200);
}

function fsTick() {
  if (!fsTimerState || fsTimerState.isPaused || fsTimerState.inChainBuffer) return;
  const remaining = Math.max(0, Math.round((fsTimerState.endAt - Date.now()) / 1000));
  fsTimerState.remainingSec = remaining;

  const numEl = document.getElementById('fs-number');
  if (numEl) numEl.textContent = formatTimerDisplay(remaining);

  // ─── TOTEM RING UPDATE ──────────────────────────────────────────────────
  // Bars deplete proportionally. The ACTIVE arc (bars still 'alive' at full
  // opacity) shrinks counterclockwise as time elapses. Depleted bars fade to
  // 15% opacity — they remain visible as ghost-marks, preserving the totem.
  if (fsTimerState.ringBars && fsTimerState.totalSec > 0) {
    const fractionElapsed = (fsTimerState.totalSec - remaining) / fsTimerState.totalSec;
    const totalBars = fsTimerState.barCount; // 60 (slots, not actual bar count due to cardinal gaps)
    // We rendered 60 slots minus 4 cardinal positions = 56 bars in ringBars.
    // For depletion we use the slot index (0..59) so cardinal gaps remain
    // visually consistent with the 60-second/12-position clock metaphor.
    const slotsPassed = Math.floor(fractionElapsed * totalBars);
    fsTimerState.ringBars.forEach(({el, index, isHeavy}) => {
      // index is the slot index (0..59), incrementing clockwise from 12
      const isDepleted = index < slotsPassed;
      el.setAttribute('opacity', isDepleted ? '0.15' : '1');
      // Last 5 seconds: active bars get a touch heavier — totem "breathing" before completion
      if (remaining <= 5 && remaining > 0 && !isDepleted) {
        el.setAttribute('stroke-width', isHeavy ? '4' : '3');
      } else {
        el.setAttribute('stroke-width', isHeavy ? '3' : '2');
      }
    });
  }

  // Countdown blips for HOLDs only
  if (fsTimerState.kind === 'hold' && remaining > 0 && remaining <= 3 && !fsTimerState.hasBeepedAt[remaining]) {
    fsTimerState.hasBeepedAt[remaining] = true;
    playCountdownBlip();
  }

  if (remaining <= 0) {
    fsFinish();
  }
}

function playCountdownBlip() {
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 660;
  const now = ctx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.18, now + 0.01);
  gain.gain.linearRampToValueAtTime(0, now + 0.12);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.12);
  if (navigator.vibrate) { try { navigator.vibrate(35); } catch(_){} }
}

function fsFinish() {
  if (!fsTimerState) return;
  if (fsTimerState.intervalId) clearInterval(fsTimerState.intervalId);
  fsTimerState.intervalId = null;
  fsTimerState.isRunning = false;

  // At completion: restore the full totem — all bars bright, the pattern whole again.
  if (fsTimerState.ringBars) {
    fsTimerState.ringBars.forEach(({el, isHeavy}) => {
      el.setAttribute('opacity', '1');
      el.setAttribute('stroke-width', isHeavy ? '4' : '3');
    });
  }
  const numEl = document.getElementById('fs-number');
  if (numEl) {
    numEl.textContent = '✓';
    numEl.style.transition = 'transform 0.4s';
    numEl.style.transform = 'scale(1.06)';
  }
  const stateEl = document.getElementById('fs-state');
  if (stateEl) {
    stateEl.textContent = 'COMPLETE';
    stateEl.style.opacity = '0.7';
  }

  playAlarmBeep();
  maybeShowNotification(fsTimerState.description);

  // HOLD → REST chain if queued
  if (fsTimerState.chainTo && fsTimerState.kind === 'hold') {
    setTimeout(() => enterChainBuffer(), 800);
  } else {
    setTimeout(() => closeFullscreenTimer(), 2500);
  }
}

function enterChainBuffer() {
  if (!fsTimerState || !fsTimerState.chainTo) return;
  fsTimerState.inChainBuffer = true;
  let bufferRemaining = 5;

  const stateEl = document.getElementById('fs-state');
  const numEl = document.getElementById('fs-number');
  const hintEl = document.getElementById('fs-hint');
  const kindEl = document.getElementById('fs-kind');
  const overlay = document.getElementById('fs-timer-overlay');
  if (kindEl) kindEl.textContent = 'REST IN';
  if (hintEl) hintEl.textContent = 'TAP TO SKIP  ·  HOLD TO CANCEL';
  if (numEl) numEl.style.transform = 'scale(1)';

  // Visually shift from HOLD-yellow → REST-teal during the buffer so the mode change is felt
  if (overlay) {
    overlay.style.transition = 'background 0.8s ease';
    overlay.style.background = TIMER_PALETTE.rest;
  }

  const updateBuffer = () => {
    if (!fsTimerState || !fsTimerState.inChainBuffer) return;
    if (stateEl) stateEl.textContent = 'STARTING REST · ' + bufferRemaining + 's';
    if (numEl) numEl.textContent = bufferRemaining + '';
    bufferRemaining--;
    if (bufferRemaining < 0) {
      transitionToChainedTimer();
    }
  };

  updateBuffer();
  fsTimerState.bufferIntervalId = setInterval(updateBuffer, 1000);
}

function skipChainBuffer() {
  if (!fsTimerState || !fsTimerState.inChainBuffer) return;
  if (fsTimerState.bufferIntervalId) clearInterval(fsTimerState.bufferIntervalId);
  transitionToChainedTimer();
}

function transitionToChainedTimer() {
  if (!fsTimerState || !fsTimerState.chainTo) {
    closeFullscreenTimer();
    return;
  }
  if (fsTimerState.bufferIntervalId) clearInterval(fsTimerState.bufferIntervalId);
  const chain = fsTimerState.chainTo;
  if (fsTimerState.wakeLock) {
    try { fsTimerState.wakeLock.release(); } catch(_){}
  }
  // Brief pause so the morph feels intentional
  setTimeout(() => {
    closeFullscreenTimer();
    openFullscreenTimer(chain.sec, chain.description, chain.accent, 'rest', null);
    setTimeout(() => { if (fsTimerState) fsStart(); }, 100);
  }, 200);
}

function closeFullscreenTimer() {
  if (fsTimerState) {
    if (fsTimerState.intervalId) clearInterval(fsTimerState.intervalId);
    if (fsTimerState.bufferIntervalId) clearInterval(fsTimerState.bufferIntervalId);
    if (fsTimerState.wakeLock) {
      try { fsTimerState.wakeLock.release(); } catch(_){}
    }
  }
  fsTimerState = null;
  const existing = document.getElementById('fs-timer-overlay');
  if (existing) existing.remove();
}

function handleTimerClick(id, totalSeconds, description) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const state = btn.getAttribute('data-state');

  if (state === 'idle') {
    // Start
    startInAppTimer(id, totalSeconds, description);
  } else if (state === 'running') {
    // Cancel
    cancelInAppTimer(id);
  } else if (state === 'done') {
    // Reset to idle
    resetTimerButton(id, totalSeconds);
  }
}

function startInAppTimer(id, totalSeconds, description) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'running');
  btn.setAttribute('data-remaining', totalSeconds + '');
  btn.style.background = '#1a1208';
  btn.style.borderColor = '#ff6b3555';
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '⏸'; icon.style.color = '#ff6b35'; }

  // Notification permission prompt on first start
  if ('Notification' in window && Notification.permission === 'default' && !notificationPermissionAsked) {
    notificationPermissionAsked = true;
    Notification.requestPermission().catch(()=>{});
  }

  const endAt = Date.now() + totalSeconds * 1000;
  const tick = () => {
    const b = document.getElementById(id);
    if (!b) {
      // DOM element gone (card collapsed or re-rendered) — clean up
      if (activeTimers[id]) {
        clearInterval(activeTimers[id].intervalId);
        delete activeTimers[id];
      }
      return;
    }
    if (b.getAttribute('data-state') !== 'running') return;
    const remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    b.setAttribute('data-remaining', remaining + '');
    const text = b.querySelector('.timer-text');
    if (text) text.textContent = formatTimerDisplay(remaining);
    const fill = b.querySelector('.timer-fill');
    if (fill) {
      const pct = ((totalSeconds - remaining) / totalSeconds) * 100;
      fill.style.width = pct + '%';
    }
    if (remaining <= 0) {
      finishInAppTimer(id, description);
      return;
    }
  };
  tick();
  const intId = setInterval(tick, 1000);
  activeTimers[id] = { intervalId: intId };
}

function cancelInAppTimer(id) {
  const t = activeTimers[id];
  if (t && t.intervalId) clearInterval(t.intervalId);
  delete activeTimers[id];
  const btn = document.getElementById(id);
  if (!btn) return;
  const total = parseInt(btn.getAttribute('data-total'), 10);
  resetTimerButton(id, total);
}

function resetTimerButton(id, totalSeconds) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'idle');
  btn.setAttribute('data-remaining', totalSeconds + '');
  btn.style.background = '#141414';
  btn.style.borderColor = '#2a2a2a';
  btn.style.boxShadow = 'none';
  btn.classList.remove('timer-flash');
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '▷'; icon.style.color = '#ff6b35'; }
  const text = btn.querySelector('.timer-text');
  if (text) text.textContent = formatTimerDisplay(totalSeconds);
  const fill = btn.querySelector('.timer-fill');
  if (fill) fill.style.width = '0%';
}

function finishInAppTimer(id, description) {
  const t = activeTimers[id];
  if (t && t.intervalId) clearInterval(t.intervalId);
  delete activeTimers[id];
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'done');
  btn.style.background = '#0a2a0a';
  btn.style.borderColor = '#6aff3b';
  btn.style.boxShadow = '0 0 0 0 #6aff3b88';
  btn.classList.add('timer-flash');
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '✓'; icon.style.color = '#6aff3b'; }
  const text = btn.querySelector('.timer-text');
  if (text) { text.textContent = 'Done!'; text.style.color = '#6aff3b'; }
  const fill = btn.querySelector('.timer-fill');
  if (fill) fill.style.width = '100%';
  // Alarm
  playAlarmBeep();
  maybeShowNotification(description);
  // Auto-reset after 8 seconds
  setTimeout(() => {
    const b = document.getElementById(id);
    if (b && b.getAttribute('data-state') === 'done') {
      const total = parseInt(b.getAttribute('data-total'), 10);
      const text2 = b.querySelector('.timer-text');
      if (text2) text2.style.color = '#ebebeb';
      resetTimerButton(id, total);
    }
  }, 8000);
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────

function render() {
  renderTabs();
  const dayContextless = activeTab === 'overview' || activeTab === 'sleep';
  document.getElementById('day-selector').style.display = dayContextless ? 'none' : 'flex';
  document.getElementById('day-banner').style.display = dayContextless ? 'none' : 'flex';
  document.getElementById('catchup-banner').style.display = dayContextless ? 'none' : '';
  document.getElementById('reorder-hint').style.display = dayContextless ? 'none' : '';
  if (!dayContextless) {
    renderDaySelector();
    renderReorderHint();
    renderCatchUpBanner();
    renderDayBanner();
  }
  renderActiveTab();
}

function renderTabs() {
  const tabAccent = getTabAccent(activeTab);

  // Tab buttons: active tab gets its accent underline + glow
  document.querySelectorAll('[data-tab]').forEach(btn => {
    const t = btn.dataset.tab;
    const isActive = t === activeTab;
    const myAccent = getTabAccent(t);
    btn.style.color = isActive ? '#ebebeb' : '#444';
    btn.style.borderBottom = isActive ? '2px solid ' + myAccent : '2px solid transparent';
    btn.style.transition = 'color 0.2s, border-color 0.2s';
    // Subtle dot under each tab label that hints at its colour even when inactive
    btn.dataset.accent = myAccent;
  });

  // Ambient glow above the tab strip — a faint horizontal band of the active tab's colour
  const tabsBar = document.getElementById('main-tabs');
  if (tabsBar) {
    tabsBar.style.borderBottom = '1px solid ' + tabAccent + '22';
    tabsBar.style.boxShadow = 'inset 0 -16px 24px -16px ' + tabAccent + '1f';
  }

  // Header gets a sliver of the tab colour as a top-edge accent line
  const header = document.querySelector('.header');
  if (header) {
    header.style.borderTop = '2px solid ' + tabAccent;
    header.style.transition = 'border-color 0.3s';
  }

  // Subtle body-level tint — a radial wash anchored at the top
  document.body.style.backgroundImage = 'radial-gradient(ellipse 800px 400px at 50% -100px, ' + tabAccent + '10, transparent)';
  document.body.style.transition = 'background 0.3s';

  // Week label inherits the tab tint subtly when active
  const weekLabel = document.getElementById('week-label');
  if (weekLabel) {
    weekLabel.style.color = tabAccent + 'aa';
  }
}

function renderDaySelector() {
  const sel = document.getElementById('day-selector');
  sel.innerHTML = '';
  const todayIdx = getTodayActiveDay();

// ─── DAY PILL DRAG-TO-REORDER ────────────────────────────────────────────────

let dragState = null; // {sourceMonPos, sourceEl, ghostEl, startX, startY, moved}

function attachDragHandlers(btn) {
  let pressTimer = null;
  let startX = 0, startY = 0;
  let activated = false;
  let cancelled = false;

  const onPressStart = (clientX, clientY) => {
    startX = clientX; startY = clientY; activated = false; cancelled = false;
    pressTimer = setTimeout(() => {
      if (cancelled) return;
      activateDrag(btn, clientX, clientY);
      activated = true;
    }, 450); // long press threshold
  };

  const onPressMove = (clientX, clientY) => {
    if (!activated) {
      // Any meaningful movement before activation cancels drag intent — let scroll happen
      const dx = Math.abs(clientX - startX);
      const dy = Math.abs(clientY - startY);
      if (dx > 6 || dy > 6) {
        cancelled = true;
        clearTimeout(pressTimer);
      }
      return;
    }
    handleDragMove(clientX, clientY);
  };

  const onPressEnd = () => {
    clearTimeout(pressTimer);
    cancelled = true;
    if (activated) {
      handleDragEnd(btn);
      activated = false;
    }
  };

  btn.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    onPressStart(t.clientX, t.clientY);
  }, {passive:true});
  btn.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    // Only block native scroll once drag has actually activated
    if (activated) e.preventDefault();
    onPressMove(t.clientX, t.clientY);
  }, {passive:false});
  btn.addEventListener('touchend', onPressEnd);
  btn.addEventListener('touchcancel', onPressEnd);

  btn.addEventListener('mousedown', (e) => {
    onPressStart(e.clientX, e.clientY);
    const onMove = (ev) => onPressMove(ev.clientX, ev.clientY);
    const onUp = () => {
      onPressEnd();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function activateDrag(sourceEl, x, y) {
  // Haptic feedback
  if (navigator.vibrate) { try { navigator.vibrate(40); } catch(e){} }
  const monPos = parseInt(sourceEl.getAttribute('data-monpos'), 10);
  // Floating ghost
  const rect = sourceEl.getBoundingClientRect();
  const ghost = sourceEl.cloneNode(true);
  ghost.style.position = 'fixed';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  ghost.style.width = rect.width + 'px';
  ghost.style.height = rect.height + 'px';
  ghost.style.opacity = '0.85';
  ghost.style.pointerEvents = 'none';
  ghost.style.zIndex = '9999';
  ghost.style.transform = 'scale(1.1)';
  ghost.style.boxShadow = '0 6px 18px rgba(0,0,0,0.6)';
  ghost.style.transition = 'transform 0.1s';
  document.body.appendChild(ghost);
  sourceEl.style.opacity = '0.25';
  dragState = {
    sourceEl,
    sourceMonPos: monPos,
    ghostEl: ghost,
    grabOffsetX: x - rect.left,
    grabOffsetY: y - rect.top,
    moved: false
  };
}

function handleDragMove(x, y) {
  if (!dragState) return;
  dragState.moved = true;
  const g = dragState.ghostEl;
  g.style.left = (x - dragState.grabOffsetX) + 'px';
  g.style.top = (y - dragState.grabOffsetY) + 'px';

  // Auto-scroll the day selector when finger is near left or right edge
  const sel = document.getElementById('day-selector');
  if (sel) {
    const rect = sel.getBoundingClientRect();
    const edgeZone = 60; // px from edge that triggers scroll
    const maxSpeed = 14; // px per frame at the very edge
    let scrollDelta = 0;
    if (x < rect.left + edgeZone) {
      const t = (rect.left + edgeZone - x) / edgeZone; // 0..1
      scrollDelta = -Math.min(maxSpeed, Math.ceil(t * maxSpeed));
    } else if (x > rect.right - edgeZone) {
      const t = (x - (rect.right - edgeZone)) / edgeZone;
      scrollDelta = Math.min(maxSpeed, Math.ceil(t * maxSpeed));
    }
    if (scrollDelta !== 0) {
      sel.scrollLeft += scrollDelta;
      // Keep auto-scrolling on a timer in case finger holds still at edge
      if (!dragState.autoScrollInterval) {
        dragState.autoScrollInterval = setInterval(() => {
          if (!dragState) return;
          sel.scrollLeft += dragState.lastScrollDelta || 0;
        }, 16);
      }
      dragState.lastScrollDelta = scrollDelta;
    } else if (dragState.autoScrollInterval) {
      clearInterval(dragState.autoScrollInterval);
      dragState.autoScrollInterval = null;
      dragState.lastScrollDelta = 0;
    }
  }

  // Find which day pill we're hovering over
  g.style.display = 'none';
  const elBelow = document.elementFromPoint(x, y);
  g.style.display = '';
  const targetPill = elBelow ? elBelow.closest('.day-pill') : null;
  // Highlight target
  document.querySelectorAll('.day-pill').forEach(p => {
    if (p === targetPill && p !== dragState.sourceEl) {
      p.style.outline = '2px dashed #06d6a0';
    } else {
      p.style.outline = '';
    }
  });
}

function handleDragEnd(sourceEl) {
  if (!dragState) return;
  // Stop any auto-scroll
  if (dragState.autoScrollInterval) {
    clearInterval(dragState.autoScrollInterval);
    dragState.autoScrollInterval = null;
  }
  const g = dragState.ghostEl;
  // Determine drop target
  const ghostRect = g.getBoundingClientRect();
  const dropX = ghostRect.left + ghostRect.width / 2;
  const dropY = ghostRect.top + ghostRect.height / 2;
  g.style.display = 'none';
  const elBelow = document.elementFromPoint(dropX, dropY);
  const targetPill = elBelow ? elBelow.closest('.day-pill') : null;
  if (targetPill && targetPill !== sourceEl) {
    const targetMonPos = parseInt(targetPill.getAttribute('data-monpos'), 10);
    swapDayPositions(dragState.sourceMonPos, targetMonPos);
  }
  // Cleanup
  g.remove();
  sourceEl.style.opacity = '';
  document.querySelectorAll('.day-pill').forEach(p => p.style.outline = '');
  if (dragState.moved) {
    sourceEl.classList.add('drag-suppress-click');
    setTimeout(() => sourceEl.classList.remove('drag-suppress-click'), 300);
  }
  dragState = null;
}

function swapDayPositions(fromMonPos, toMonPos) {
  const order = getWeekDayOrder().slice();
  const [moved] = order.splice(fromMonPos, 1);
  order.splice(toMonPos, 0, moved);

  render();

function todayKey() {
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function dateKeyDaysAgo(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function getAllMetrics() {
  // Returns array of {date, weight, bodyFat, chest, waist, ...} sorted by date asc
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('fraser_metrics_') === 0) {
      try {
        const v = JSON.parse(localStorage.getItem(k));
        const date = k.substring('fraser_metrics_'.length);
        out.push({date, ...v});
      } catch(e) {}
    }
  }
  out.sort((a,b) => a.date.localeCompare(b.date));
  return out;
}

function saveMetrics(date, data) {
  try { localStorage.setItem('fraser_metrics_' + date, JSON.stringify(data)); } catch(e) {}
}

function getAllMetricPhotos() {
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('fraser_photo_') === 0) {
      try {
        const date = k.substring('fraser_photo_'.length);
        out.push({date, dataUrl: localStorage.getItem(k)});
      } catch(e) {}
    }
  }
  out.sort((a,b) => b.date.localeCompare(a.date));
  return out;
}

function savePhoto(date, dataUrl) {

}

function deletePhoto(date) {

function compressAndStorePhoto(file, date) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 600;
      const ratio = Math.min(maxW / img.width, 1);
      const w = img.width * ratio;
      const h = img.height * ratio;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      savePhoto(date, dataUrl);
      renderOverview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Returns { total: N exercises tracked across all weeks,
