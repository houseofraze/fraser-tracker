// ─── WEEKDAY MAPPING ──────────────────────────────────────────────────────────
// Maps JS day-of-week (0=Sun, 1=Mon, ..., 6=Sat) to PROGRAM index (0-6).
// Default: Mon→Push, Tue→Pull, Wed→Legs, Thu→Skills, Fri→Full Body, Sat→Active Recovery, Sun→Complete Rest.
const WEEKDAY_TO_ACTIVE_DAY = [6, 0, 1, 2, 3, 4, 5];
const WEEKDAY_LABELS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEEKDAY_LABELS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getTodayWeekday() { return new Date().getDay(); }
function getTodayActiveDay() { return WEEKDAY_TO_ACTIVE_DAY[getTodayWeekday()]; }

// Returns weekday index for a given activeDay (PROGRAM index)
function getWeekdayForActiveDay(activeDayIdx) {
  for (let i = 0; i < 7; i++) {
    if (WEEKDAY_TO_ACTIVE_DAY[i] === activeDayIdx) return i;
  }
  return null;
}

// Days since Monday for "this week" tracking (0 = Monday, 6 = Sunday)
function daysSinceMonday() {
  const dow = getTodayWeekday();
  return (dow + 6) % 7; // Mon→0, Tue→1, ..., Sun→6
}

function todayLocaleDate(opts) {
  return new Date().toLocaleDateString(undefined, opts || {weekday:'short', day:'numeric', month:'short'});
}

function parseDurationFromReps(reps) {
  if (!reps) return null;
  const m = String(reps).match(/(\d+)(?:\s*-\s*(\d+))?\s*sec/i);
  if (!m) return null;
  return parseInt(m[2] || m[1], 10);
}

function getDefaultRestSec(ex) {
  const id = ex.id;
  // Heavy compounds — long rest
  if (['bench','dips','dbshoulder','wpullups','bbrow','squat','rdl','deadlift','dbbench'].indexOf(id) >= 0) return 180;
  // Skill work + bilateral leg work — moderate-long
  if (['muscleup','planche','frontlever','farmer','bulgariansplit'].indexOf(id) >= 0) return 120;
  // Volume work
  if (['ringrow','lunges','legpress','pikepush','bardips','bwpullups'].indexOf(id) >= 0) return 90;
  // Isolation, holds, finishers — short rest
  if (['laterals','tricep','curls','facepulls','calves','hangle','plank','pushupfinisher','lsit'].indexOf(id) >= 0) return 60;
  // Sprint intervals walk-back is the rest
  if (id === 'sprints') return 60;
  return 90;
}

// Returns map of activeDay → status: 'today' | 'past_complete' | 'past_partial' | 'past_missed' | 'upcoming' | 'rest_day' | 'past_skipped'
function getWeekStatus() {
  const status = {};
  const today = getTodayActiveDay();
  const todayWd = getTodayWeekday();
  const isCurrentWeek = weekOffset === 0;
  const isFutureWeek = weekOffset > 0;
  const isPastWeek = weekOffset < 0;

  for (let ai = 0; ai < PROGRAM.length; ai++) {
    const day = PROGRAM[ai];
    const wd = getWeekdayForActiveDay(ai);
    // Use the actual week being viewed for data lookup
    const log = loadData('workout', weekOffset, day.day) || {};
    const setsLogged = Object.keys(log).reduce((acc, exId) => {
      const sets = log[exId] && log[exId].sets ? log[exId].sets : [];
      return acc + sets.filter(s => s && s.weight && s.reps).length;
    }, 0);
    const totalExercises = day.exercises ? day.exercises.length : 0;
    const skipped = !!loadData('skipped', weekOffset, day.day);
    const isRestDay = totalExercises === 0;

    if (isFutureWeek) {
      // Future weeks: nothing has happened yet, no "missed" concept
      status[ai] = isRestDay ? 'rest_day' : 'upcoming';
      continue;
    }

    if (isPastWeek) {
      // Past weeks: every day is past, evaluate purely on logs
      if (isRestDay) status[ai] = 'rest_day';
      else if (skipped) status[ai] = 'past_skipped';
      else if (setsLogged === 0) status[ai] = 'past_missed';
      else if (setsLogged < totalExercises * 2) status[ai] = 'past_partial';
      else status[ai] = 'past_complete';
      continue;
    }

    // Current week — relative to today
    if (ai === today) {
      status[ai] = 'today';
    } else if (isRestDay) {
      status[ai] = 'rest_day';
    } else if (skipped) {
      status[ai] = 'past_skipped';
    } else {
      const pos = (wd + 6) % 7;
      const todayPos = (todayWd + 6) % 7;
      if (pos < todayPos) {
        if (setsLogged === 0) status[ai] = 'past_missed';
        else if (setsLogged < totalExercises * 2) status[ai] = 'past_partial';
        else status[ai] = 'past_complete';
      } else {
        status[ai] = 'upcoming';
      }
    }
  }
  return status;
}

function getCatchUpInfo() {
  const status = getWeekStatus();
  const missed = [];
  Object.keys(status).forEach(ai => {
    if (status[ai] === 'past_missed' || status[ai] === 'past_partial') {
      missed.push(parseInt(ai, 10));
    }
  });
  // Priority order for catch-up: Legs > Push > Pull > Full Body > Skills
  // Map: Day 3 (Legs) > Day 1 (Push) > Day 2 (Pull) > Day 5 (Full Body) > Day 4 (Skills)
  const priority = {2: 1, 0: 2, 1: 3, 4: 4, 3: 5}; // activeDay → priority (lower = more important)
  const sorted = missed.slice().sort((a,b) => (priority[a]||99) - (priority[b]||99));
  return { missed: sorted, count: missed.length };
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────

const getKey = (type, w, d) => `fraser_${type}_w${w}_d${d}`;

function saveData(type, dayNum, data) {
  try { localStorage.setItem(getKey(type, weekOffset, dayNum), JSON.stringify(data)); } catch(e) {}
}

function loadData(type, w, d) {
  try {
    const v = localStorage.getItem(getKey(type, w, d));
    return v ? JSON.parse(v) : null;
  } catch(e) { return null; }
}

function getWorkoutLog(dayNum) { return loadData('workout', weekOffset, dayNum) || {}; }
function getNutriLog(dayNum)   { return loadData('nutri',   weekOffset, dayNum) || {}; }
function getWaterLog(dayNum)   { return loadData('water',   weekOffset, dayNum) || {total:0,entries:[]}; }

function getShoppingLog(w) { return loadData('shopping', w, 0) || {}; }
function saveShoppingLog(w, data) { 
  try { 
    localStorage.setItem(getKey('shopping', w, 0), JSON.stringify(data)); 
  } catch(e) {} 
}

function toggleShoppingItem(category, itemName) {
  const log = getShoppingLog(weekOffset);
  const key = category + '_' + itemName;
  const updated = {...log, [key]: !log[key]};
  saveShoppingLog(weekOffset, updated);
  renderShopping();
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children.flat()) {
    if(c==null||c===false) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}

function div(style,...children) { return el('div',{style},...children); }
function span(style,text)       { return el('span',{style},text); }
function bebas(size,color,text) { return el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:size+'px',color,letterSpacing:'0.04em',lineHeight:'1'}},text); }

function formatIngredient(ingredient) {
  if (!useMetric) {
    return ingredient.a + ' ' + (ingredient.u || '') + ' ' + ingredient.n;
  } else {
    return ingredient.m + ' ' + (ingredient.mu || '') + ' ' + ingredient.n;
  }
}

function formatTime(seconds) {
  if (seconds < 60) return seconds + 's';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return secs > 0 ? mins + 'm ' + secs + 's' : mins + 'm';
}

// ─── TIMER FUNCTIONS ──────────────────────────────────────────────────────────

const activeTimers = {}; // id -> {intervalId, remaining, total, button, descId}
let audioCtx = null;
let notificationPermissionAsked = false;

function ensureAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  // Resume if suspended (iOS requires user interaction)
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().catch(()=>{});
  }
  return audioCtx;
}

function playAlarmBeep() {
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  // Three rising beeps
  const playBeep = (freq, startTime, duration) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  };
  const now = ctx.currentTime;
  playBeep(880, now, 0.18);
  playBeep(880, now + 0.25, 0.18);
  playBeep(1320, now + 0.5, 0.4);
  // Vibrate too (Android mostly)
  if (navigator.vibrate) {
    try { navigator.vibrate([200, 100, 200, 100, 400]); } catch(e) {}
  }
}

function maybeShowNotification(description) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    try { new Notification('Timer Complete', { body: description, silent: false }); } catch(e) {}
  } else if (Notification.permission !== 'denied' && !notificationPermissionAsked) {
    notificationPermissionAsked = true;
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') {
        try { new Notification('Timer Complete', { body: description, silent: false }); } catch(e) {}
      }
    }).catch(()=>{});
  }
}

function formatTimerDisplay(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return mins + ':' + (secs < 10 ? '0' + secs : secs);
}

function buildTimerButton(seconds, description) {
  const id = 'tm_' + Math.random().toString(36).substr(2, 9);
  const btn = el('button', {
    id: id,
    class: 'btn timer-btn',
    'data-state': 'idle',
    'data-total': seconds + '',
    'data-remaining': seconds + '',
    style: {
      position: 'relative',
      background: '#141414',
      color: '#ebebeb',
      border: '1px solid #2a2a2a',
      borderRadius: '18px',
      padding: '5px 12px 5px 9px',
      fontSize: '11px',
      marginTop: '8px',
      fontFamily: "'DM Mono',monospace",
      display: 'inline-flex',
      alignItems: 'center',
      gap: '6px',
      cursor: 'pointer',
      transition: 'all 0.2s',
      overflow: 'hidden'
    },
    onclick: (e) => {
      e.stopPropagation();
      // Need to lift audio ctx on this gesture for iOS
      ensureAudioCtx();
      handleTimerClick(id, seconds, description);
    }
  });
  // Progress fill layer (sits under the content)
  btn.appendChild(el('span', {
    class: 'timer-fill',
    style: {
      position: 'absolute',
      top: '0', left: '0', bottom: '0',
      width: '0%',
      background: 'linear-gradient(90deg, #ff6b3522, #ff6b3544)',
      transition: 'width 1s linear',
      pointerEvents: 'none',
      zIndex: '0'
    }
  }));
  const icon = el('span', {
    class: 'timer-icon',
    style: { color: '#ff6b35', fontSize: '11px', lineHeight: '1', position: 'relative', zIndex: '1' }
  }, '▷');
  const text = el('span', {
    class: 'timer-text',
    style: { color: '#ebebeb', position: 'relative', zIndex: '1' }
  }, formatTimerDisplay(seconds));
  btn.appendChild(icon);
  btn.appendChild(text);
  btn.setAttribute('data-description', description);
  return btn;
}

function handleTimerClick(id, totalSeconds, description) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const state = btn.getAttribute('data-state');

  if (state === 'idle') {
    // Start
    startInAppTimer(id, totalSeconds, description);
  } else if (state === 'running') {
    // Cancel
    cancelInAppTimer(id);
  } else if (state === 'done') {
    // Reset to idle
    resetTimerButton(id, totalSeconds);
  }
}

function startInAppTimer(id, totalSeconds, description) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'running');
  btn.setAttribute('data-remaining', totalSeconds + '');
  btn.style.background = '#1a1208';
  btn.style.borderColor = '#ff6b3555';
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '⏸'; icon.style.color = '#ff6b35'; }

  // Notification permission prompt on first start
  if ('Notification' in window && Notification.permission === 'default' && !notificationPermissionAsked) {
    notificationPermissionAsked = true;
    Notification.requestPermission().catch(()=>{});
  }

  const endAt = Date.now() + totalSeconds * 1000;
  const tick = () => {
    const b = document.getElementById(id);
    if (!b) {
      // DOM element gone (card collapsed or re-rendered) — clean up
      if (activeTimers[id]) {
        clearInterval(activeTimers[id].intervalId);
        delete activeTimers[id];
      }
      return;
    }
    if (b.getAttribute('data-state') !== 'running') return;
    const remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    b.setAttribute('data-remaining', remaining + '');
    const text = b.querySelector('.timer-text');
    if (text) text.textContent = formatTimerDisplay(remaining);
    const fill = b.querySelector('.timer-fill');
    if (fill) {
      const pct = ((totalSeconds - remaining) / totalSeconds) * 100;
      fill.style.width = pct + '%';
    }
    if (remaining <= 0) {
      finishInAppTimer(id, description);
      return;
    }
  };
  tick();
  const intId = setInterval(tick, 1000);
  activeTimers[id] = { intervalId: intId };
}

function cancelInAppTimer(id) {
  const t = activeTimers[id];
  if (t && t.intervalId) clearInterval(t.intervalId);
  delete activeTimers[id];
  const btn = document.getElementById(id);
  if (!btn) return;
  const total = parseInt(btn.getAttribute('data-total'), 10);
  resetTimerButton(id, total);
}

function resetTimerButton(id, totalSeconds) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'idle');
  btn.setAttribute('data-remaining', totalSeconds + '');
  btn.style.background = '#141414';
  btn.style.borderColor = '#2a2a2a';
  btn.style.boxShadow = 'none';
  btn.classList.remove('timer-flash');
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '▷'; icon.style.color = '#ff6b35'; }
  const text = btn.querySelector('.timer-text');
  if (text) text.textContent = formatTimerDisplay(totalSeconds);
  const fill = btn.querySelector('.timer-fill');
  if (fill) fill.style.width = '0%';
}

function finishInAppTimer(id, description) {
  const t = activeTimers[id];
  if (t && t.intervalId) clearInterval(t.intervalId);
  delete activeTimers[id];
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'done');
  btn.style.background = '#0a2a0a';
  btn.style.borderColor = '#6aff3b';
  btn.style.boxShadow = '0 0 0 0 #6aff3b88';
  btn.classList.add('timer-flash');
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '✓'; icon.style.color = '#6aff3b'; }
  const text = btn.querySelector('.timer-text');
  if (text) { text.textContent = 'Done!'; text.style.color = '#6aff3b'; }
  const fill = btn.querySelector('.timer-fill');
  if (fill) fill.style.width = '100%';
  // Alarm
  playAlarmBeep();
  maybeShowNotification(description);
  // Auto-reset after 8 seconds
  setTimeout(() => {
    const b = document.getElementById(id);
    if (b && b.getAttribute('data-state') === 'done') {
      const total = parseInt(b.getAttribute('data-total'), 10);
      const text2 = b.querySelector('.timer-text');
      if (text2) text2.style.color = '#ebebeb';
      resetTimerButton(id, total);
    }
  }, 8000);
}

function todayKey() {
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function dateKeyDaysAgo(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function getAllMetrics() {
  // Returns array of {date, weight, bodyFat, chest, waist, ...} sorted by date asc
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('fraser_metrics_') === 0) {
      try {
        const v = JSON.parse(localStorage.getItem(k));
        const date = k.substring('fraser_metrics_'.length);
        out.push({date, ...v});
      } catch(e) {}
    }
  }
  out.sort((a,b) => a.date.localeCompare(b.date));
  return out;
}

function saveMetrics(date, data) {

}

function getAllMetricPhotos() {

function compressAndStorePhoto(file, date) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 600;
      const ratio = Math.min(maxW / img.width, 1);
      const w = img.width * ratio;
      const h = img.height * ratio;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      savePhoto(date, dataUrl);
      renderOverview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

//          weeklyVolume: [{week:offset, volume:total}] }
function calcStrengthProgression() {
  const data = {}; // exId -> [{week, weight, reps, volume}]
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const m = k && k.match(/^fraser_workout_w(-?\d+)_d(\d+)$/);
    if (!m) continue;
    const week = parseInt(m[1], 10);
    try {
      const v = JSON.parse(localStorage.getItem(k));
      Object.keys(v).forEach(exId => {
        const sets = (v[exId].sets || []).filter(s => s && s.weight && s.reps);
        if (!sets.length) return;
        // Top set = max weight × reps
        let topW = 0, topR = 0, vol = 0;
        sets.forEach(s => {
          const w = parseFloat(s.weight) || 0;
          const r = parseInt(s.reps,10) || 0;
          vol += w * r;
          if (w > topW || (w === topW && r > topR)) { topW = w; topR = r; }
        });
        if (!data[exId]) data[exId] = [];
        data[exId].push({week, weight: topW, reps: topR, volume: vol});
      });
    } catch(e) {}
  }
  // For each exercise, find first and latest entry by week (most negative = oldest, 0 = current)
  const progressList = [];
  Object.keys(data).forEach(exId => {
    const entries = data[exId].slice().sort((a,b) => a.week - b.week);
    if (!entries.length) return;
    const first = entries[0];
    const latest = entries[entries.length-1];
    const exName = findExerciseName(exId);
    let deltaPct = null;
    if (first.weight > 0 && entries.length > 1) {
      // Weight × reps comparison
      const startScore = first.weight * Math.max(first.reps, 1);
      const endScore = latest.weight * Math.max(latest.reps, 1);
      deltaPct = ((endScore - startScore) / startScore) * 100;
    }
    progressList.push({
      exId, name: exName,
      first: {weight: first.weight, reps: first.reps, week: first.week},
      latest: {weight: latest.weight, reps: latest.reps, week: latest.week},
      deltaPct,
      sessions: entries.length
    });
  });
  // Sort by delta % desc, ties by sessions
  progressList.sort((a,b) => {
    const da = a.deltaPct == null ? -999 : a.deltaPct;
    const db = b.deltaPct == null ? -999 : b.deltaPct;
    return db - da;
  });
  return progressList;
}

function findExerciseName(exId) {
  for (const day of PROGRAM) {
    if (!day.exercises) continue;
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) return ex.name;
  }
  return exId;
}

// Returns {daysTrained, totalDays, completionPct, currentStreak}
function calcTrainingConsistency() {
  // Count days in current week with any logged sets
  let daysTrained = 0;
  const trainingDays = PROGRAM.filter(d => d.exercises && d.exercises.length > 0 && d.title !== 'Active Recovery' && d.title !== 'Complete Rest');
  trainingDays.forEach(d => {
    const log = loadData('workout', 0, d.day);
    if (log && Object.keys(log).some(exId => {
      return log[exId].sets && log[exId].sets.some(s => s && s.weight && s.reps);
    })) daysTrained++;
  });
  // Streak: count weeks back where at least 3 training days were logged
  let currentStreak = 0;
  for (let w = 0; w >= -12; w--) {
    let count = 0;
    trainingDays.forEach(d => {
      const log = loadData('workout', w, d.day);
      if (log && Object.keys(log).some(exId =>
        log[exId].sets && log[exId].sets.some(s => s && s.weight && s.reps)
      )) count++;
    });
    if (count >= 3) currentStreak++;
    else if (w < 0) break;
  }
  return {
    daysTrained,
    totalDays: trainingDays.length,
    completionPct: Math.round((daysTrained / trainingDays.length) * 100),
    currentStreak
  };
}

// Returns {avgKcal, target, daysHitProtein, daysLogged}
function calcNutritionAdherence() {
  let totalKcal = 0, totalTarget = 0;
  let daysHitProtein = 0, daysLogged = 0;
  PROGRAM.forEach(d => {
    const log = loadData('nutri', 0, d.day);
    const np = NUTRITION[d.nutriType];
    if (!log || !np) return;
    const ckCount = Object.keys(log).filter(k => log[k]).length;
    if (ckCount === 0) return;
    daysLogged++;
    let kcal = 0, protein = 0;
    np.meals.forEach((m, mi) => {
      if (log[mi]) { kcal += m.kcal; protein += m.protein; }
    });
    totalKcal += kcal;
    totalTarget += np.calories;
    // Hit protein if ≥ 90% of target
    if (protein >= np.protein * 0.9) daysHitProtein++;
  });
  return {
    avgKcal: daysLogged ? Math.round(totalKcal / daysLogged) : 0,
    avgTarget: daysLogged ? Math.round(totalTarget / daysLogged) : 0,
    daysHitProtein,
    daysLogged
  };
}

function calcWaterAdherence() {
  let daysHit = 0, totalDays = 0;
  PROGRAM.forEach(d => {
    const log = loadData('water', 0, d.day);
    const np = NUTRITION[d.nutriType];
    if (!log || !np) return;
    const target = WATER_TARGETS[d.nutriType] || 3500;
    if (log.total > 0) totalDays++;
    if (log.total >= target * 0.9) daysHit++;
  });
  return {daysHit, totalDays};
}

// Sparkline svg generator
function sparkline(values, color, width, height) {
  if (!values || values.length < 2) return null;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const stepX = width / (values.length - 1);
  const points = values.map((v, i) => {
    const x = i * stepX;
    const y = height - ((v - min) / range) * height;
    return x + ',' + y;
  }).join(' ');
  const svg = el('svg', {width: width+'', height: height+'', style:{display:'block'}});
  svg.innerHTML = '<polyline fill="none" stroke="' + color + '" stroke-width="1.5" points="' + points + '"/>';
  return svg;
}

  const wColor = wa.totalDays === 0 ? '#333' : wa.daysHit >= 5 ? '#06d6a0' : wa.daysHit >= 3 ? '#3bffe8' : '#ff7b3b';
  waterCard.appendChild(bebas(28, wColor, wa.totalDays === 0 ? '—' : wa.daysHit + '/' + wa.totalDays));
  root.appendChild(waterCard);

  // ── 5b. BODY COMPOSITION (BIA) — collapsible ──
  const biaCard = div({background:'#0c0c0c',border:'1px solid #1a1a1a',borderRadius:'12px',marginBottom:'12px',overflow:'hidden'});
  const biaHdr = el('button',{class:'btn',style:{width:'100%',background:'transparent',border:'none',padding:'14px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'},onclick:()=>{openOverviewSections.bia = !openOverviewSections.bia; renderOverview();}});
  const biaLeft = div({});
  biaLeft.appendChild(el('div',{style:{fontSize:'8px',color:'#444',letterSpacing:'0.22em',textTransform:'uppercase'}},'Body Composition'));
  biaLeft.appendChild(el('div',{style:{fontSize:'9px',color:'#555',marginTop:'3px',fontFamily:"'DM Mono',monospace"}},'Renpho / bioimpedance scale'));
  biaHdr.appendChild(biaLeft);
  biaHdr.appendChild(el('span',{style:{color:'#444',fontSize:'10px'}}, openOverviewSections.bia ? '▲' : '▼'));
  biaCard.appendChild(biaHdr);

  if (openOverviewSections.bia) {
    const biaBody = div({padding:'0 14px 14px'});
    const biaFields = METRIC_FIELDS.filter(f => f.group === 'bia');
    if (!latest) {
      biaBody.appendChild(el('div',{style:{fontSize:'10px',color:'#444',textAlign:'center',padding:'14px 0'}},'No bioimpedance data logged yet'));
    } else {
      // Two-column grid
      const grid = div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'});
      biaFields.forEach(f => {
        const cur = latest[f.key];
        if (cur == null) return; // skip unfilled fields
        const cell = div({background:'#080808',borderRadius:'7px',padding:'9px 10px',border:'1px solid #161616'});
        cell.appendChild(el('div',{style:{fontSize:'7px',color:'#444',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:'4px'}}, f.label));
        const valRow = div({display:'flex',alignItems:'baseline',gap:'3px'});
        valRow.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'19px',color:'#ebebeb',letterSpacing:'0.04em'}}, cur+''));
        if (f.unit) valRow.appendChild(el('div',{style:{fontSize:'8px',color:'#555',fontFamily:"'DM Mono',monospace"}}, f.unit));
        cell.appendChild(valRow);
        if (prev && prev[f.key] != null) {
          const d = (parseFloat(cur) - parseFloat(prev[f.key])).toFixed(2).replace(/\.?0+$/, '');
          const dNum = parseFloat(d);
          if (dNum !== 0) {
            // For body fat, subcutaneous, visceral — down is good. For muscle/water/protein — up is good.
            const goodDown = ['bodyFat','subcutaneousFat','visceralFat','metabolicAge'].indexOf(f.key) >= 0;
            const isGood = goodDown ? dNum < 0 : dNum > 0;
            const dc = isGood ? '#06d6a0' : '#ff7b3b';
            cell.appendChild(el('div',{style:{fontSize:'8px',color:dc,marginTop:'3px',fontFamily:"'DM Mono',monospace"}}, (dNum > 0 ? '+' : '') + d + ' vs last'));
          }
        }
        grid.appendChild(cell);
      });
      biaBody.appendChild(grid);
      biaBody.appendChild(el('div',{style:{fontSize:'8px',color:'#333',marginTop:'10px',fontStyle:'italic',lineHeight:'1.5'}},'Note: Bioimpedance scales typically underestimate body fat by 2-4% on lean athletic males. Use for trend tracking, not absolute accuracy.'));
    }
    biaCard.appendChild(biaBody);
  }
  root.appendChild(biaCard);

  // ── 6. MEASUREMENTS (collapsible) ──
  const measCard = div({background:'#0c0c0c',border:'1px solid #1a1a1a',borderRadius:'12px',marginBottom:'12px',overflow:'hidden'});
  const measHdr = el('button',{class:'btn',style:{width:'100%',background:'transparent',border:'none',padding:'14px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'},onclick:()=>{openOverviewSections.measurements = !openOverviewSections.measurements; renderOverview();}});
  measHdr.appendChild(el('div',{style:{fontSize:'8px',color:'#444',letterSpacing:'0.22em',textTransform:'uppercase'}},'Tape Measurements'));
  measHdr.appendChild(el('span',{style:{color:'#444',fontSize:'10px'}}, openOverviewSections.measurements ? '▲' : '▼'));
  measCard.appendChild(measHdr);

  if (openOverviewSections.measurements) {
    const measBody = div({padding:'0 14px 14px'});
    const tapeFields = METRIC_FIELDS.filter(f => f.group === 'tape');
    if (!latest) {
      measBody.appendChild(el('div',{style:{fontSize:'10px',color:'#444',textAlign:'center',padding:'14px 0'}},'No measurements logged yet'));
    } else {
      tapeFields.forEach(f => {
        const r = div({display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #141414'});
        r.appendChild(el('div',{style:{fontSize:'10px',color:'#888'}}, f.label));
        const right = div({display:'flex',gap:'10px',alignItems:'baseline'});
        const cur = latest[f.key];
        right.appendChild(el('div',{style:{fontSize:'12px',color: cur ? '#ebebeb' : '#333',fontFamily:"'DM Mono',monospace"}}, cur ? cur + ' ' + f.unit : '—'));
        if (cur && prev && prev[f.key]) {
          const d = (parseFloat(cur) - parseFloat(prev[f.key])).toFixed(1);
          const dc = parseFloat(d) < 0 ? '#06d6a0' : parseFloat(d) > 0 ? '#ff7b3b' : '#666';
          right.appendChild(el('div',{style:{fontSize:'9px',color:dc,fontFamily:"'DM Mono',monospace",minWidth:'48px',textAlign:'right'}}, (parseFloat(d) > 0 ? '+' : '') + d));
        }
        r.appendChild(right);
        measBody.appendChild(r);
      });
    }
    measCard.appendChild(measBody);
  }
  root.appendChild(measCard);

  // ── 7. PROGRESS PHOTOS (collapsible) ──
  const photosCard = div({background:'#0c0c0c',border:'1px solid #1a1a1a',borderRadius:'12px',marginBottom:'12px',overflow:'hidden'});
  const photos = getAllMetricPhotos();
  const phHdr = el('button',{class:'btn',style:{width:'100%',background:'transparent',border:'none',padding:'14px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'},onclick:()=>{openOverviewSections.photos = !openOverviewSections.photos; renderOverview();}});
  const phLeft = div({});
  phLeft.appendChild(el('div',{style:{fontSize:'8px',color:'#444',letterSpacing:'0.22em',textTransform:'uppercase'}},'Progress Photos'));
  phLeft.appendChild(el('div',{style:{fontSize:'9px',color:'#555',marginTop:'3px',fontFamily:"'DM Mono',monospace"}}, photos.length + ' photos'));
  phHdr.appendChild(phLeft);
  phHdr.appendChild(el('span',{style:{color:'#444',fontSize:'10px'}}, openOverviewSections.photos ? '▲' : '▼'));
  photosCard.appendChild(phHdr);

  if (openOverviewSections.photos) {
    const phBody = div({padding:'0 14px 14px'});
    const upInput = el('input',{type:'file',accept:'image/*',style:{display:'none'},id:'photo-upload-input'});
    upInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) compressAndStorePhoto(file, todayKey());
    };
    const upBtn = el('button',{class:'btn',style:{width:'100%',background:'#1a1a1a',border:'1px solid #2a2a2a',color:'#ebebeb',padding:'10px',borderRadius:'6px',fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',marginBottom:'10px'},onclick:()=>upInput.click()},'+ ADD PHOTO TODAY');
    phBody.appendChild(upInput);
    phBody.appendChild(upBtn);
    if (!photos.length) {
      phBody.appendChild(el('div',{style:{fontSize:'9px',color:'#444',textAlign:'center',padding:'10px 0'}},'No photos yet'));
    } else {
      const grid = div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'});
      photos.forEach(p => {
        const tile = div({position:'relative',borderRadius:'6px',overflow:'hidden',border:'1px solid #1a1a1a',background:'#080808'});
        const img = el('img',{src:p.dataUrl,style:{width:'100%',height:'auto',display:'block'}});
        tile.appendChild(img);
        const lbl = div({position:'absolute',bottom:'0',left:'0',right:'0',padding:'4px 6px',background:'linear-gradient(transparent, #000a)',fontSize:'8px',color:'#ebebeb',display:'flex',justifyContent:'space-between',fontFamily:"'DM Mono',monospace"});
        lbl.appendChild(el('span',{},p.date));
        const del = el('button',{class:'btn',style:{background:'transparent',border:'none',color:'#ff7b3b',fontSize:'10px',padding:'0',cursor:'pointer'},onclick:(e)=>{e.stopPropagation();if(confirm('Delete photo from ' + p.date + '?')) deletePhoto(p.date);}},'✕');
        lbl.appendChild(del);
        tile.appendChild(lbl);
        grid.appendChild(tile);
      });
      phBody.appendChild(grid);
    }
    photosCard.appendChild(phBody);
  }
  root.appendChild(photosCard);

  // ── Modal renders into a separate slot ──
  if (metricsModalOpen) {
    root.appendChild(buildMetricsModal());
  }
}

function showMetricsModal() {
  metricsModalOpen = true;
  renderOverview();
}

function buildMetricsModal() {
  const allMetrics = getAllMetrics();
  const today = todayKey();
  const existing = allMetrics.find(m => m.date === today) || {};

  const overlay = div({position:'fixed',top:'0',left:'0',right:'0',bottom:'0',background:'#000d',zIndex:'100',display:'flex',alignItems:'flex-start',justifyContent:'center',overflowY:'auto',padding:'30px 16px'});
  overlay.onclick = (e) => { if (e.target === overlay) { metricsModalOpen = false; renderOverview(); } };

  const modal = div({background:'#0e0e0e',border:'1px solid #2a2a2a',borderRadius:'14px',width:'100%',maxWidth:'420px',padding:'18px',position:'relative'});
  modal.onclick = (e) => e.stopPropagation();

  modal.appendChild(el('div',{style:{fontSize:'8px',color:'#444',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:'4px'}}, 'Log Metrics'));
  modal.appendChild(bebas(28, '#06d6a0', today));
  modal.appendChild(el('div',{style:{fontSize:'9px',color:'#555',marginBottom:'14px',marginTop:'4px'}}, 'Leave any field blank to skip'));

  const inputs = {};
  const renderFieldRow = (f) => {
    const row = div({display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #161616'});
    row.appendChild(el('div',{style:{fontSize:'11px',color:'#aaa'}}, f.label));
    const right = div({display:'flex',alignItems:'center',gap:'6px'});
    const inp = el('input',{
      type:'number',
      step:f.step,
      placeholder:'—',
      value: existing[f.key] != null ? existing[f.key] : '',
      style:{
        background:'#080808',
        border:'1px solid #1e1e1e',
        color:'#ebebeb',
        padding:'6px 10px',
        borderRadius:'5px',
        width:'80px',
        fontSize:'12px',
        textAlign:'right',
        fontFamily:"'DM Mono',monospace"
      }
    });
    inputs[f.key] = inp;
    right.appendChild(inp);
    right.appendChild(el('div',{style:{fontSize:'10px',color:'#555',width:'30px'}}, f.unit));
    row.appendChild(right);
    return row;
  };

  const sectionHeader = (label) => el('div', {style:{
    fontSize:'7px',color:'#06d6a0',letterSpacing:'0.22em',textTransform:'uppercase',
    marginTop:'14px',marginBottom:'2px',fontWeight:'700'
  }}, label);

  // Primary
  modal.appendChild(sectionHeader('Primary'));
  METRIC_FIELDS.filter(f => f.group === 'primary').forEach(f => modal.appendChild(renderFieldRow(f)));

  // Bioimpedance
  modal.appendChild(sectionHeader('Bioimpedance / Renpho'));
  METRIC_FIELDS.filter(f => f.group === 'bia').forEach(f => modal.appendChild(renderFieldRow(f)));

  // Tape measurements
  modal.appendChild(sectionHeader('Tape Measurements'));
  METRIC_FIELDS.filter(f => f.group === 'tape').forEach(f => modal.appendChild(renderFieldRow(f)));

  // Optional photo upload
  const photoRow = div({padding:'12px 0 8px',borderBottom:'1px solid #161616'});
  photoRow.appendChild(el('div',{style:{fontSize:'11px',color:'#aaa',marginBottom:'6px'}},'Progress Photo (optional)'));
  const photoInput = el('input',{type:'file',accept:'image/*',style:{display:'none'},id:'modal-photo-input'});
  let photoFile = null;
  const photoStatus = el('div',{style:{fontSize:'9px',color:'#555',marginTop:'4px',fontFamily:"'DM Mono',monospace"}},'No photo selected');
  photoInput.onchange = (e) => {
    photoFile = e.target.files[0];
    photoStatus.textContent = photoFile ? 'Selected: ' + photoFile.name : 'No photo selected';
    photoStatus.style.color = '#06d6a0';
  };
  const phSelectBtn = el('button',{class:'btn',style:{background:'#1a1a1a',border:'1px solid #2a2a2a',color:'#ebebeb',padding:'7px 12px',borderRadius:'5px',fontSize:'10px',cursor:'pointer'},onclick:()=>photoInput.click()},'Choose photo');
  photoRow.appendChild(phSelectBtn);
  photoRow.appendChild(photoInput);
  photoRow.appendChild(photoStatus);
  modal.appendChild(photoRow);

  // Buttons
  const btnRow = div({display:'flex',gap:'8px',marginTop:'16px'});
  const cancelBtn = el('button',{class:'btn',style:{flex:'1',background:'transparent',border:'1px solid #2a2a2a',color:'#888',padding:'11px',borderRadius:'8px',fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',cursor:'pointer'},onclick:()=>{metricsModalOpen=false;renderOverview();}},'Cancel');
  const saveBtn = el('button',{
    class:'btn',
    style:{flex:'2',background:'#06d6a0',border:'none',color:'#000',padding:'11px',borderRadius:'8px',fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',cursor:'pointer',fontWeight:'700'},
    onclick:()=>{
      const data = {};
      let any = false;
      METRIC_FIELDS.forEach(f => {
        const v = inputs[f.key].value.trim();
        if (v !== '') { data[f.key] = parseFloat(v); any = true; }
      });
      if (!any && !photoFile) {
        alert('Enter at least one metric or add a photo.');
        return;
      }
      if (any) saveMetrics(today, data);
      if (photoFile) {
        compressAndStorePhoto(photoFile, today);
        // The compress is async; close modal — render will refresh once photo lands
      }
      metricsModalOpen = false;
      renderOverview();
    }
  },'Save');
  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(saveBtn);
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  return overlay;
}

// ─── WORKOUT TAB ──────────────────────────────────────────────────────────────

function renderWorkout() {
  const day = PROGRAM[activeDay];
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  const wLog = getWorkoutLog(day.day);

  day.exercises.forEach(ex => {
    const isOpen = expandedEx===ex.id;
    const exLog = wLog[ex.id] || {};
    const filled = (exLog.sets||[]).filter(s=>s&&s.reps).length;

    const card = el('div',{class:'card',style:{background:'#0e0e0e',border:'1px solid ' + (isOpen?day.accent+'33':'#1a1a1a'),borderRadius:'8px',marginBottom:'7px',overflow:'hidden'}});

    const header = div({padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'},
      div({},
        div({display:'flex',alignItems:'center',gap:'8px',marginBottom:'3px',flexWrap:'wrap'},
          el('span',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'17px',letterSpacing:'0.04em'}},ex.name),
          el('span',{style:{fontSize:'7px',color:day.accent,border:'1px solid ' + day.accent+'33',padding:'2px 5px',borderRadius:'3px',letterSpacing:'0.1em'}},ex.category),
          filled>0 ? el('span',{style:{fontSize:'7px',color:'#6aff3b',letterSpacing:'0.1em'}},filled + '/' + ex.sets + ' ✓') : null
        ),
        el('div',{style:{fontSize:'9px',color:'#444'}},ex.sets + ' × ' + ex.reps + ' · T: ' + ex.tempo)
      ),
      el('span',{style:{color:'#2a2a2a',fontSize:'14px',transition:'transform 0.2s',display:'inline-block',transform:isOpen?'rotate(180deg)':'rotate(0deg)'}}, '▾')
    );
    header.style.cursor='pointer';
    header.onclick = () => {
      expandedEx = isOpen?null:ex.id;
      renderWorkout();
    };
    card.appendChild(header);

    if(isOpen) {
      const body = div({borderTop:'1px solid #161616'});
      
      const tech = div({padding:'12px 14px',background:'#090909'});
      tech.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.22em',color:day.accent,textTransform:'uppercase',marginBottom:'8px'}},'Technique'));
      if(ex.tempoDesc) {
        const tempoBox = div({fontSize:'9px',color:'#666',padding:'7px 10px',background:'#0e0e0e',borderRadius:'4px',borderLeft:'2px solid ' + day.accent,marginBottom:'8px'});
        tempoBox.appendChild(el('span',{style:{color:'#3a3a3a',textTransform:'uppercase',letterSpacing:'0.1em'}},'Tempo '));
        tempoBox.appendChild(el('span',{style:{color:'#999'}},ex.tempo));
        tempoBox.appendChild(el('span',{style:{color:'#333'}},' — ' + ex.tempoDesc));
        tech.appendChild(tempoBox);
      }
      ex.cues.forEach(c => {
        tech.appendChild(div({display:'flex',gap:'7px',fontSize:'11px',color:'#777',lineHeight:'1.5',marginBottom:'5px'},
          el('span',{style:{color:day.accent,flexShrink:'0',opacity:'0.6'}},'→'),
          el('span',{},c)
        ));
      });
      body.appendChild(tech);

      const setsDiv = div({padding:'12px 14px'});
      setsDiv.appendChild(el('div',{style:{fontSize:'7px',letterSpacing:'0.2em',color:'#333',textTransform:'uppercase',marginBottom:'8px'}},'Log Sets'));
      const hdr = div({display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr',gap:'5px',marginBottom:'5px'});
      ['#','KG','REPS','NOTE'].forEach(h => hdr.appendChild(el('div',{style:{fontSize:'7px',color:'#2a2a2a',letterSpacing:'0.12em',textAlign:'center'}},h)));
      setsDiv.appendChild(hdr);

      for(let si=0;si<ex.sets;si++) {
        const s = exLog.sets?.[si]||{};
        const row = div({display:'grid',gridTemplateColumns:'24px 1fr 1fr 1fr',gap:'5px',marginBottom:'4px',alignItems:'center'});
        row.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'13px',color:s.reps?day.accent:'#222',textAlign:'center'}},(si+1)+''));

        ['weight','reps'].forEach(field => {
          const inp = el('input',{type:'number',class:'set-input',placeholder:'—',value:s[field]||''});
          inp.onfocus = () => inp.style.borderColor=day.accent;
          inp.onblur = () => inp.style.borderColor='#1e1e1e';
          inp.oninput = () => {
            const cur = getWorkoutLog(day.day);
            const ex2 = cur[ex.id]||{sets:[]};
            const sets = [...(ex2.sets||[])];
            sets[si] = {...(sets[si]||{}),[field]:inp.value};
            const updated = {...cur,[ex.id]:{...ex2,sets}};
            saveData('workout',day.day,updated);
          };
          row.appendChild(inp);
        });

        const noteInp = el('input',{type:'text',class:'set-input',placeholder:'—',value:s.note||''});
        noteInp.style.fontSize='10px';
        noteInp.onfocus = () => noteInp.style.borderColor=day.accent;
        noteInp.onblur = () => noteInp.style.borderColor='#1e1e1e';
        noteInp.oninput = () => {
          const cur = getWorkoutLog(day.day);
          const ex2 = cur[ex.id]||{sets:[]};
          const sets = [...(ex2.sets||[])];
          sets[si] = {...(sets[si]||{}),note:noteInp.value};
          saveData('workout',day.day,{...cur,[ex.id]:{...ex2,sets}});
        };
        row.appendChild(noteInp);
        setsDiv.appendChild(row);
      }

      // Rest timer + duration timer (if applicable)
      const timerRow = div({display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center',marginTop:'10px',paddingTop:'10px',borderTop:'1px dashed #1a1a1a'});

      // Rest timer (between sets)
      const restSec = getDefaultRestSec(ex);
      const restLabel = div({display:'flex',alignItems:'center',gap:'6px'});
      restLabel.appendChild(el('span',{style:{fontSize:'7px',color:'#444',letterSpacing:'0.15em',textTransform:'uppercase'}},'Rest'));
      restLabel.appendChild(buildTimerButton(restSec, 'Rest — ' + ex.name));
      timerRow.appendChild(restLabel);

      // Duration timer if reps are time-based (L-sit holds, planks, front lever, etc.)
      const durSec = parseDurationFromReps(ex.reps);
      if (durSec) {
        const durLabel = div({display:'flex',alignItems:'center',gap:'6px',marginLeft:'4px'});
        durLabel.appendChild(el('span',{style:{fontSize:'7px',color:'#444',letterSpacing:'0.15em',textTransform:'uppercase'}},'Hold'));
        durLabel.appendChild(buildTimerButton(durSec, 'Hold — ' + ex.name));
        timerRow.appendChild(durLabel);
      }

      setsDiv.appendChild(timerRow);
      body.appendChild(setsDiv);
      card.appendChild(body);
    }
    list.appendChild(card);
  });
}

// ─── NUTRITION TAB ────────────────────────────────────────────────────────────

function renderNutrition() {
  const day = PROGRAM[activeDay];
  const np = NUTRITION[day.nutriType];
  const nLog = getNutriLog(day.day);
  const list = document.getElementById('meal-list');
  list.innerHTML = '';

  // Units toggle
  const unitsToggle = el('div', {style: {display: 'flex', justifyContent: 'flex-end', marginBottom: '10px'}});
  unitsToggle.appendChild(el('span', {
    class: 'units-toggle',
    style: {background: useMetric ? '#333' : '#111', color: useMetric ? '#ebebeb' : '#666'},
    onclick: () => {useMetric = !useMetric; renderNutrition();}
  }, useMetric ? 'Metric' : 'Imperial'));
  list.appendChild(unitsToggle);

  const macroGrid = div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'6px',marginBottom:'10px'});
  [{label:'CAL',val:np.calories,color:np.color},{label:'PRO',val:np.protein+'g',color:'#00E5FF'},{label:'CARB',val:np.carbs+'g',color:'#A8FF78'},{label:'FAT',val:np.fat+'g',color:'#FFD166'}].forEach(m => {
    macroGrid.appendChild(div({background:'#0e0e0e',border:'1px solid #1a1a1a',borderRadius:'8px',padding:'10px 6px',textAlign:'center'},
      el('div',{style:{fontSize:'7px',color:'#333',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:'4px'}},m.label),
      bebas(18,m.color,''+m.val)
    ));
  });
  list.appendChild(macroGrid);

  const checked = Object.values(nLog).filter(Boolean).length;
  const prog = div({background:'#0e0e0e',border:'1px solid #1a1a1a',borderRadius:'8px',padding:'10px 14px',marginBottom:'10px',display:'flex',justifyContent:'space-between',alignItems:'center'});
  prog.appendChild(el('span',{style:{fontSize:'10px',color:'#555',letterSpacing:'0.1em',textTransform:'uppercase'}},'Meals Completed'));
  const dotsWrap = div({display:'flex',alignItems:'center',gap:'8px'});
  const dots = div({display:'flex',gap:'4px'});
  np.meals.forEach((_,i)=>dots.appendChild(div({width:'8px',height:'8px',borderRadius:'50%',background:nLog[i]?np.color:'#222'})));
  dotsWrap.appendChild(dots);
  dotsWrap.appendChild(bebas(16,checked===np.meals.length?'#6aff3b':np.color,checked + '/' + np.meals.length));
  prog.appendChild(dotsWrap);
  list.appendChild(prog);

  np.meals.forEach((meal,mi) => {
    const isOpen = expandedMeal===mi;

function addWater(amount, dayNum) {
  const cur = getWaterLog(dayNum);
  const now = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  const updated = {total:cur.total+amount,entries:[...cur.entries,{amount,time:now}]};
  saveData('water',dayNum,updated);
  renderWater();
}

function removeLastWater(dayNum) {
  const cur = getWaterLog(dayNum);
  if(!cur.entries.length) return;
  const last = cur.entries[cur.entries.length-1];
  const updated = {total:Math.max(0,cur.total-last.amount),entries:cur.entries.slice(0,-1)};
  saveData('water',dayNum,updated);
  renderWater();
}

function getTomorrowActiveDay() {
  const tomorrowWeekday = (getTodayWeekday() + 1) % 7;
  return WEEKDAY_TO_ACTIVE_DAY[tomorrowWeekday];
}

// Recommended sleep cycles for a given activeDay index based on training demand
function getRecommendedCyclesForDay(activeDayIdx) {
  // 0=Push, 1=Pull, 2=Legs, 3=Skills, 4=Full Body, 5=Active Rec, 6=Rest
  if (activeDayIdx === 2 || activeDayIdx === 4) return 6; // Legs, Full Body — heavy CNS load
  if (activeDayIdx === 3) return 5; // Skills — REM matters most
  if (activeDayIdx === 0 || activeDayIdx === 1) return 5; // Push/Pull — 5-6 acceptable
  return 5; // Active Rec, Rest
}

function getSleepRationaleForDay(activeDayIdx) {
  if (activeDayIdx === 2) return 'Heavy CNS demand on Legs day. Squats, RDLs and sprints need full nervous system reset.';
  if (activeDayIdx === 4) return 'Compound strength work tomorrow. Deadlifts pull from full-body recovery reserves.';
  if (activeDayIdx === 0) return 'Push day means heavy bench and shoulder work. 8h+ keeps shoulder joint repair on track.';
  if (activeDayIdx === 1) return 'Pull day means weighted pull-ups and rows. Neural recovery affects grip strength directly.';
  if (activeDayIdx === 3) return 'Skills day depends on REM sleep. Motor patterns consolidate in cycles 4-6 — under-sleeping kills skill progress.';
  if (activeDayIdx === 5) return 'Active recovery day. Sleep aids the recovery you\'re doing during the day.';
  return 'Rest day tomorrow. Use the chance to fully recover from the week.';
}

  wakeTime: '06:30',
  cycles: 6,         // 6 cycles = 9h
  cycleMinutes: 90,
  windDownMinutes: 30,
  alertBeforeMinutes: 60
};

const SLEEP_QUALITY_TIERS = [
  { min: 0,   max: 360, label: 'Insufficient', color: '#ff5b5b', advice: 'Less than 6h sleep severely blunts muscle protein synthesis and elevates cortisol. Body recomp will struggle.' },
  { min: 360, max: 420, label: 'Low',          color: '#FFD166', advice: '6-7h is survivable but suboptimal — recovery and hormonal output will be reduced.' },
  { min: 420, max: 480, label: 'Adequate',     color: '#3bffe8', advice: '7-8h is a solid baseline for most adults.' },
  { min: 480, max: 600, label: 'Optimal',      color: '#06d6a0', advice: '8-10h is where lean recomp accelerates — recovery, testosterone, growth hormone all peak.' },
  { min: 600, max: 9999,label: 'Long',         color: '#9b72cf', advice: 'Over 10h is unusual — could indicate sleep debt or fatigue worth checking.' }
];

function getSleepSettings() {
  try {
    const v = localStorage.getItem('fraser_sleep_settings');
    return v ? Object.assign({}, SLEEP_DEFAULTS, JSON.parse(v)) : Object.assign({}, SLEEP_DEFAULTS);
  } catch (e) { return Object.assign({}, SLEEP_DEFAULTS); }
}

function saveSleepSettings(s) {
  try { localStorage.setItem('fraser_sleep_settings', JSON.stringify(s)); } catch (e) {}
}

function getSleepLog(date) {
  try {
    const v = localStorage.getItem('fraser_sleep_' + date);
    return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}

function saveSleepLog(date, data) {
  try { localStorage.setItem('fraser_sleep_' + date, JSON.stringify(data)); } catch (e) {}
}

function getAllSleepLogs() {
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('fraser_sleep_') === 0 && k !== 'fraser_sleep_settings') {
      try {
        const date = k.substring('fraser_sleep_'.length);
        const data = JSON.parse(localStorage.getItem(k));
        if (data && (data.bedtime || data.wakeTime)) out.push(Object.assign({date}, data));
      } catch (e) {}
    }
  }
  out.sort((a, b) => a.date.localeCompare(b.date));
  return out;
}

function parseTimeStr(timeStr) {
  if (!timeStr || typeof timeStr !== 'string') return null;
  const parts = timeStr.split(':');
  if (parts.length !== 2) return null;
  const h = parseInt(parts[0], 10), m = parseInt(parts[1], 10);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}

function formatTimeMin(mins) {
  while (mins < 0) mins += 1440;
  while (mins >= 1440) mins -= 1440;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

function formatDuration(mins) {
  if (mins == null || isNaN(mins)) return '—';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
}

function calculateSleepSchedule(wakeTimeStr, cycles, settings) {
  const wakeMin = parseTimeStr(wakeTimeStr);
  if (wakeMin == null) return null;
  const totalSleepMin = cycles * settings.cycleMinutes;
  const asleepBy = wakeMin - totalSleepMin;
  const inBedBy = asleepBy - settings.windDownMinutes;
  const windDownStart = inBedBy - settings.alertBeforeMinutes;
  return {
    wakeTime: wakeTimeStr,
    asleepByStr: formatTimeMin(asleepBy),
    inBedByStr: formatTimeMin(inBedBy),
    windDownStartStr: formatTimeMin(windDownStart),
    totalHours: cycles * 1.5,
    asleepByMin: ((asleepBy % 1440) + 1440) % 1440,
    inBedByMin: ((inBedBy % 1440) + 1440) % 1440,
    windDownStartMin: ((windDownStart % 1440) + 1440) % 1440
  };
}

function calculateSleepDuration(bedtimeStr, wakeTimeStr) {
  const bed = parseTimeStr(bedtimeStr);
  let wake = parseTimeStr(wakeTimeStr);
  if (bed == null || wake == null) return null;
  if (wake <= bed) wake += 1440;
  return wake - bed;
}

function getSleepQuality(durationMin) {
  if (durationMin == null) return null;
  return SLEEP_QUALITY_TIERS.find(t => durationMin >= t.min && durationMin < t.max) || null;
}

function getCurrentTimeMin() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function getYesterdayKey() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

// Open native alarm clock with pre-filled time (Android works; iOS opens Clock app)
function setSystemAlarm(timeStr, label) {
  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = ua.indexOf('android') >= 0;
  const isIOS = /iphone|ipad|ipod/.test(ua) || (ua.indexOf('mac') >= 0 && 'ontouchend' in document);
  const parts = timeStr.split(':');
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  if (isAndroid) {
    const msg = encodeURIComponent((label || 'Alarm').substring(0, 60));
    const url = 'intent://#Intent;action=android.intent.action.SET_ALARM;'
      + 'i.android.intent.extra.alarm.HOUR=' + h + ';'
      + 'i.android.intent.extra.alarm.MINUTES=' + m + ';'
      + 'S.android.intent.extra.alarm.MESSAGE=' + msg + ';'
      + 'B.android.intent.extra.alarm.SKIP_UI=true;'
      + 'end';
    window.location.href = url;
  } else if (isIOS) {
    // iOS doesn't allow setting alarms from web. Open Clock app's alarm tab.
    window.location.href = 'clock-alarm:';
  } else {
    alert('Set an alarm for ' + timeStr + '\n\n' + (label || ''));
  }
}

function categorizeIngredient(name) {
  const n = name.toLowerCase();
  
  // === SPECIFIC OVERRIDES (handle conflicts first) ===
  
  // Eggplant is a vegetable (must come BEFORE egg check)
  if (n.indexOf('eggplant') >= 0) return 'Fruits & Vegetables';
  
  // Plant-based milks are pantry, not dairy
  if (n.indexOf('almond milk') >= 0 || n.indexOf('coconut milk') >= 0 ||
      n.indexOf('soy milk') >= 0 || n.indexOf('oat milk') >= 0) return 'Pantry & Condiments';
  
  // Coconut water is pantry
  if (n.indexOf('coconut water') >= 0) return 'Pantry & Condiments';
  
  // Nut butters go to Nuts & Seeds (must come BEFORE the dairy butter check)
  if (n.indexOf('almond butter') >= 0 || n.indexOf('peanut butter') >= 0 ||
      n.indexOf('cashew butter') >= 0 || n.indexOf('tahini') >= 0) return 'Nuts & Seeds';
  
  // Coconut oil is pantry (not nuts)
  if (n.indexOf('coconut oil') >= 0) return 'Pantry & Condiments';
  
  // Vinegars are pantry, not fruits (apple cider vinegar etc.)
  if (n.indexOf('vinegar') >= 0) return 'Pantry & Condiments';
  
  // Sauces and pastes are pantry
  if (n.indexOf('sauce') >= 0 || n.indexOf('paste') >= 0 ||
      n.indexOf('hummus') >= 0 || n.indexOf('salsa') >= 0) return 'Pantry & Condiments';
  
  // === PROTEINS (animal proteins, protein powders, fish) ===
  if (n.indexOf('chicken') >= 0 || n.indexOf('beef') >= 0 || n.indexOf('mince') >= 0 ||
      n.indexOf('salmon') >= 0 || n.indexOf('tuna') >= 0 || n.indexOf('barramundi') >= 0 ||
      n.indexOf('turkey') >= 0 || n.indexOf('cod') >= 0 || n.indexOf('prawn') >= 0 ||
      n.indexOf('snapper') >= 0 || n.indexOf('whiting') >= 0 || n.indexOf('trout') >= 0 ||
      n.indexOf('lamb') >= 0 || n.indexOf('pork') >= 0 || n.indexOf('bacon') >= 0 ||
      n.indexOf('whey') >= 0 || n.indexOf('casein') >= 0 ||
      n.indexOf('protein powder') >= 0 ||
      n.indexOf('sirloin') >= 0 || n.indexOf('thigh') >= 0 ||
      n.indexOf(' fillet') >= 0 || n.indexOf('steak') >= 0) return 'Proteins';
  
  // === DAIRY & EGGS (after eggplant exclusion above) ===
  if (n === 'egg' || n === 'eggs' || n.indexOf(' eggs') >= 0 ||
      n.indexOf('yoghurt') >= 0 || n.indexOf('yogurt') >= 0 ||
      n === 'milk' || n.endsWith(' milk') ||
      n.indexOf('cheese') >= 0 || n.indexOf('feta') >= 0 ||
      n === 'butter' || n.indexOf('grass-fed butter') >= 0 ||
      n.indexOf('cream cheese') >= 0) return 'Dairy & Eggs';
  
  // === GRAINS & CARBS ===
  if (n.indexOf('oats') >= 0 || n.indexOf('rice cake') >= 0 ||
      n === 'rice' || n.indexOf(' rice') >= 0 || n.endsWith('rice') ||
      n.indexOf('quinoa') >= 0 || n.indexOf('bread') >= 0 ||
      n.indexOf('tortilla') >= 0 || n.indexOf('granola') >= 0 ||
      n.indexOf('pasta') >= 0 || n.indexOf('couscous') >= 0) return 'Grains & Carbs';
  
  // === NUTS & SEEDS (raw nuts, seeds; butters handled above) ===
  if (n.indexOf('walnut') >= 0 ||
      n === 'almonds' || n.indexOf(' almonds') >= 0 || n.endsWith('almonds') ||
      n.indexOf('hazelnut') >= 0 || n.indexOf('pecan') >= 0 || n.indexOf('cashew') >= 0 ||
      n.indexOf('macadamia') >= 0 || n.indexOf('pine nut') >= 0 ||
      n === 'nuts' || n.endsWith(' nuts') ||
      n.indexOf('chia seed') >= 0 || n.indexOf('hemp seed') >= 0 ||
      n.indexOf('flax') >= 0 || n.indexOf('sesame seed') >= 0 ||
      n.indexOf('pumpkin seed') >= 0 || n.indexOf('sunflower seed') >= 0) return 'Nuts & Seeds';
  
  // === FRUITS ===
  const fruits = ['banana','berries','berry','blueberr','strawberr','raspberr','blackberr',
    'apple','orange','lemon','lime','grape','peach','pear','mango','melon','watermelon',
    'kiwi','pineapple','plum','nectarine','cherry'];
  for (const f of fruits) {
    if (n.indexOf(f) >= 0) return 'Fruits & Vegetables';
  }
  
  // === VEGETABLES ===
  const veg = ['tomato','spinach','broccoli','asparagus','sweet potato','potato',
    'cauliflower','mushroom','cucumber','capsicum','pepper','avocado','salad','greens',
    'leaves','vegetable','zucchini','onion','garlic','carrot','celery','kale','beet',
    'radish','edamame','olive','herb','parsley','basil','mint','coriander','cilantro',
    'dill','ginger','rosemary','thyme','sage','chive','lettuce','cabbage','sprouts'];
  for (const v of veg) {
    // skip 'olive' if it's actually 'olive oil'
    if (v === 'olive' && n.indexOf('olive oil') >= 0) continue;
    if (n.indexOf(v) >= 0) return 'Fruits & Vegetables';
  }
  
  // === PANTRY & CONDIMENTS (catch-all) ===
  return 'Pantry & Condiments';
}

function normalizeIngredientName(name) {
  let n = name.toLowerCase().trim();
  
  // Remove parenthetical descriptors like "(dry weight)", "(optional)", "(skinless)"
  while (n.indexOf('(') >= 0) {
    const start = n.indexOf('(');
    const end = n.indexOf(')', start);
    if (end < 0) break;
    n = (n.substring(0, start) + n.substring(end + 1)).trim();
    n = n.split('  ').join(' ');
  }
  
  // Strip trailing descriptors after first comma (e.g., "banana, sliced" → "banana")
  const commaIdx = n.indexOf(',');
  if (commaIdx > 0) {
    n = n.substring(0, commaIdx).trim();
  }
  
  // Remove leading descriptive words that don't change the core ingredient
  const prefixes = [
    'natural ', 'raw ', 'fresh ', 'cooked ', 'grilled ', 'roasted ', 'steamed ',
    'sautéed ', 'sauteed ', 'frozen ', 'baby ', 'wild-caught ', 'wild caught ',
    'grass-fed ', 'lean ', 'low-fat ', 'full-fat ', 'full fat ', 'whole ',
    'unsweetened ', 'warm ', 'ground ', 'large ', 'medium ',
    'atlantic ', 'plain ', 'ripe ', 'canned ', 'vanilla ', 'kalamata ', 'red '
  ];
  
  let changed = true;
  while (changed) {
    changed = false;
    for (let i = 0; i < prefixes.length; i++) {
      if (n.indexOf(prefixes[i]) === 0) {
        n = n.substring(prefixes[i].length);
        changed = true;
        break;
      }
    }
  }
  
  // Strip trailing " fillet" (so "salmon fillet" → "salmon", "barramundi fillet" → "barramundi")
  if (n.length > 7 && n.lastIndexOf(' fillet') === n.length - 7) {
    n = n.substring(0, n.length - 7).trim();
  }
  // Strip trailing " dry"
  if (n.length > 4 && n.lastIndexOf(' dry') === n.length - 4) {
    n = n.substring(0, n.length - 4).trim();
  }
  
  // Aliases for hard cases
  const aliases = {
    'leafy greens': 'salad leaves',
    'mixed leafy greens': 'salad leaves',
    'salad': 'salad leaves',
    'leaves': 'salad leaves',
    'mixed salad leaves': 'salad leaves',
    'jasmine rice': 'white rice',
    'white jasmine rice': 'white rice',
    'protein powder': 'whey protein',
    'oats': 'rolled oats',
    'mixed almonds': 'almonds',
    'mixed raw almonds': 'almonds',
    'cauliflower mash': 'cauliflower',
    'mixed roasted vegetables': 'mixed vegetables',
    'roasted vegetables': 'mixed vegetables',
    'steamed vegetables': 'mixed vegetables',
    'vegetables': 'mixed vegetables',
    'tuna in spring water': 'tuna',
    'water or low-fat milk': 'milk',
    'low-fat milk': 'milk',
    'frozen mixed berries': 'mixed berries',
    'berries': 'mixed berries',
    'lean turkey mince': 'turkey mince',
    'turkey': 'turkey mince',
    'lemon juice': 'lemon',
    'lime juice': 'lime',
    'soy sauce (low sodium)': 'soy sauce',
    'low sodium soy sauce': 'soy sauce',
    'fresh ginger grated': 'ginger',
    'fresh ginger': 'ginger',
    'fresh dill': 'dill',
    'fresh herbs': 'fresh herbs',
    'fresh blueberries': 'blueberries',
    'fresh salsa': 'salsa',
    'fresh strawberries': 'strawberries',
    'salmon': 'salmon',
    'red capsicum': 'capsicum',
    'cherry tomato': 'cherry tomatoes',
    'cherry tomatoes': 'cherry tomatoes'
  };
  
  if (aliases[n]) {
    n = aliases[n];
  }
  
  return n;
}

function buildShoppingList() {
  const items = {};
  
  PROGRAM.forEach(day => {
    const nutri = NUTRITION[day.nutriType];
    if (!nutri || !nutri.meals) return;
    
    nutri.meals.forEach(meal => {
      if (!meal.ingredients) return;
      meal.ingredients.forEach(ing => {
        const normalizedName = normalizeIngredientName(ing.n);
        // Key by normalized name + metric unit (so items measured the same way consolidate)
        const key = normalizedName + '|' + (ing.mu || '');
        
        if (items[key]) {
          items[key].amount = items[key].amount + ing.a;
          items[key].metricAmount = items[key].metricAmount + ing.m;
        } else {
          items[key] = {
            name: normalizedName,
            displayName: normalizedName.charAt(0).toUpperCase() + normalizedName.slice(1),
            amount: ing.a,
            unit: ing.u || '',
            metricAmount: ing.m,
            metricUnit: ing.mu || '',
            key: key
          };
        }
      });
    });
  });
  
  // Group by category
  const categorized = {};
  Object.values(items).forEach(item => {
    const cat = categorizeIngredient(item.name);
    if (!categorized[cat]) categorized[cat] = [];
    categorized[cat].push(item);
  });
  
  // Sort each category alphabetically
  Object.keys(categorized).forEach(cat => {
    categorized[cat].sort((a, b) => a.name.localeCompare(b.name));
  });
  
  return categorized;
}

function formatShoppingQty(item) {
  if (useMetric) {
    // Round metric amounts sensibly
    let amt = item.metricAmount;
    if (amt >= 1000 && (item.metricUnit === 'g' || item.metricUnit === 'ml')) {
      const kg = (amt / 1000).toFixed(2).replace(/\.?0+$/, '');
      const newUnit = item.metricUnit === 'g' ? 'kg' : 'l';
      return kg + ' ' + newUnit;
    }
    // Round to whole numbers for grams/ml, 1 decimal for others
    if (item.metricUnit === 'g' || item.metricUnit === 'ml') {
      amt = Math.round(amt);
    } else {
      amt = Math.round(amt * 10) / 10;
    }
    return amt + (item.metricUnit ? ' ' + item.metricUnit : '');
  } else {
    let amt = item.amount;
    amt = Math.round(amt * 100) / 100;
    // Remove trailing zeros
    amt = parseFloat(amt.toString());
    return amt + (item.unit ? ' ' + item.unit : '');
  }
}

      const wtrLog = loadData('water',w,d.day);
      const hasW = wLog&&Object.keys(wLog).length>0;
      const hasN = nLog&&Object.values(nLog).some(Boolean);
      const hasWtr = wtrLog&&wtrLog.total>0;
      const np = NUTRITION[d.nutriType];
      const card = div({flex:'1',minWidth:'50px',background:hasW||hasN?'#0e0e0e':'#090909',border:'1px solid ' + (hasW?d.accent+'44':'#141414'),borderRadius:'6px',padding:'6px'});
      card.appendChild(bebas(12,hasW?d.accent:'#222',d.title));
      card.appendChild(el('div',{style:{fontSize:'6px',color:hasW?'#555':'#1a1a1a',marginTop:'2px'}},hasW?Object.keys(wLog).length + ' ex':'—'));
      card.appendChild(el('div',{style:{fontSize:'6px',color:hasN?np.color:'#1a1a1a',marginTop:'1px'}},hasN?Object.values(nLog).filter(Boolean).length + ' meals':'no food'));
      card.appendChild(el('div',{style:{fontSize:'6px',color:hasWtr?'#3bdfff':'#1a1a1a',marginTop:'1px'}},hasWtr?(wtrLog.total/1000).toFixed(1) + 'L':'no H₂O'));
      row.appendChild(card);
    });
    section.appendChild(row);
    con.appendChild(section);
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────

function setTab(t) { activeTab=t; render(); }
function changeWeek(d) { weekOffset+=d; expandedEx=null; expandedMeal=null; render(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────

activeDay = getTodayActiveDay();
render();
</script>
